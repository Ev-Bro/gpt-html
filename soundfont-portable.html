<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combo Soundfont Player</title>
    <meta name="description" content="Browser-based multi-soundfont player featuring FF7, FF9, SM64, OoT, and GoldenEye instruments">

    <style>
        /* ---- Custom Fonts ---- */
        @font-face { font-family: 'Reactor7'; src: url('./soundfont-portable-assets/Reactor7.ttf'); }
        @font-face { font-family: 'Mario64'; src: url('./soundfont-portable-assets/mario64.otf'); }
        @font-face { font-family: 'OoT'; src: url('./soundfont-portable-assets/oot.otf'); }

        /* ================================================================
           Combo Soundfont Player — CSS
           ================================================================ */

        /* ---- Theme Definitions ---- */
        [data-theme="ff7"] {
            --bg: #000000;
            --header-bar: #0000FF;
            --text-color: #FFFFFF;
            --list-outline: #0000FF;
            --category-bg: #0000FF;
            --selection-bg: #000000;
            --key-highlight: #FFFFFF;
            --scroll-thumb: #0000FF;
            --font-family: 'Reactor7', monospace;
            --tab-color: #bbbbbb;
            --kb-dark: #000060;
            --kb-mid: #0000B0;
            --kb-stroke: #0000FF;
            --kb-border: #FFFFFF;
        }

        [data-theme="ff9"] {
            --bg: #1A0F00;
            --header-bar: #8B6914;
            --text-color: #FFE0A0;
            --list-outline: #8B6914;
            --category-bg: #5C4400;
            --selection-bg: #3A2800;
            --key-highlight: #FFD700;
            --scroll-thumb: #8B6914;
            --font-family: 'Reactor7', monospace;
            --tab-color: #bbbbbb;
            --kb-dark: #1A0F00;
            --kb-mid: #5C4400;
            --kb-stroke: #8B6914;
            --kb-border: #FFE0A0;
        }

        [data-theme="sm64"] {
            --bg: #4F67DF;
            --header-bar: #FF112A;
            --text-color: #FCF900;
            --list-outline: #4F67DF;
            --category-bg: #4F67DF;
            --selection-bg: #FF112A;
            --key-highlight: #03FC00;
            --scroll-thumb: #FF112A;
            --font-family: 'Mario64', monospace;
            --tab-color: #bbbbbb;
        }

        [data-theme="oot"] {
            --bg: #1B5E20;
            --header-bar: #FFD700;
            --text-color: #FFD700;
            --list-outline: #1B5E20;
            --category-bg: #2E7D32;
            --selection-bg: #0D3B0E;
            --key-highlight: #00B0FF;
            --scroll-thumb: #FFD700;
            --font-family: 'OoT', monospace;
            --tab-color: #bbbbbb;
        }

        [data-theme="ge"] {
            --bg: #111111;
            --header-bar: #DAA520;
            --text-color: #DAA520;
            --list-outline: #3A3A3A;
            --category-bg: #1A1A1A;
            --selection-bg: #2C2C2C;
            --key-highlight: #FFD700;
            --scroll-thumb: #DAA520;
            --font-family: 'Consolas', 'Courier New', monospace;
            --tab-color: #bbbbbb;
        }

        /* ================================================================
           Reset & Base
           ================================================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-family);
            overflow: hidden;
            user-select: none;
        }

        /* ================================================================
           App Container
           ================================================================ */
        #app {
            width: 620px;
            background: var(--bg);
            border: 2px solid var(--header-bar);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        /* ================================================================
           Loading Overlay
           ================================================================ */
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #333;
            border-top-color: var(--header-bar);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-text {
            color: #888;
            font-size: 14px;
            font-family: 'Consolas', monospace;
        }

        /* ================================================================
           Tab Bar
           ================================================================ */
        #tab-bar {
            display: flex;
            height: 32px;
            background: #111;
            border-bottom: 1px solid #333;
        }

        .tab {
            flex: 1;
            background: #1a1a1a;
            border: none;
            border-right: 1px solid #333;
            color: var(--tab-color, var(--header-bar));
            font-family: 'Consolas', monospace;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            letter-spacing: 1px;
        }

        .tab:last-child {
            border-right: none;
        }

        .tab:hover {
            background: #2a2a2a;
        }

        .tab.active {
            background: var(--header-bar);
            color: #fff;
        }

        /* ================================================================
           Content Area
           ================================================================ */
        #content {
            display: flex;
            height: 240px;
        }

        #left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 10px;
            height: 28px;
            font-family: var(--font-family);
        }

        #title {
            color: var(--text-color);
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #octave-label {
            color: var(--text-color);
            font-size: 12px;
            white-space: nowrap;
        }

        #keyboard {
            flex: 1;
            margin: 4px 6px;
            image-rendering: pixelated;
        }

        /* ================================================================
           Preset List
           ================================================================ */
        #preset-list-container {
            width: 170px;
            border-left: 1px solid var(--list-outline);
            overflow-y: auto;
            background: #000;
        }

        #preset-list-container::-webkit-scrollbar {
            width: 8px;
        }

        #preset-list-container::-webkit-scrollbar-track {
            background: #000;
        }

        #preset-list-container::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 1px;
        }

        #preset-list {
            font-size: 11px;
        }

        .preset-row {
            padding: 3px 8px;
            cursor: pointer;
            color: var(--text-color);
            font-family: var(--font-family);
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 18px;
        }

        .preset-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .preset-row.category {
            background: var(--category-bg);
            font-weight: bold;
            font-size: 10px;
            letter-spacing: 0.5px;
            cursor: default;
            text-transform: uppercase;
        }

        .preset-row.selected {
            background: var(--selection-bg);
        }

        .preset-row.selected::before {
            content: '► ';
        }

        /* FF7 + FF9: 2x instrument name size, compact */
        [data-theme="ff7"] .preset-row,
        [data-theme="ff9"] .preset-row {
            font-size: 22px;
            line-height: 26px;
            padding: 0px 4px;
        }

        [data-theme="ff7"] .preset-row.category,
        [data-theme="ff9"] .preset-row.category {
            font-size: 16px;
            line-height: 20px;
            padding: 1px 4px;
        }

        /* GE: 1.5x instrument name size, compact */
        [data-theme="ge"] .preset-row {
            font-size: 17px;
            line-height: 22px;
            padding: 1px 4px;
        }

        [data-theme="ge"] .preset-row.category {
            font-size: 15px;
            line-height: 19px;
            padding: 1px 4px;
        }

        /* ================================================================
           Status Bar
           ================================================================ */
        #status-bar {
            height: 22px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            background: #0a0a0a;
            border-top: 1px solid #222;
        }

        #status-text {
            color: #555;
            font-size: 10px;
            font-family: 'Consolas', monospace;
        }

        /* ---- Volume Control ---- */
        #volume-control {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }

        #volume-icon {
            color: var(--header-bar);
            font-size: 11px;
        }

        #panic-btn {
            background: none;
            border: 1px solid #555;
            color: #c00;
            font-size: 9px;
            width: 18px;
            height: 14px;
            cursor: pointer;
            border-radius: 2px;
            padding: 0;
            line-height: 14px;
            transition: background 0.15s, border-color 0.15s;
        }

        #panic-btn:hover {
            background: #c00;
            color: #fff;
            border-color: #c00;
        }

        #volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 70px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--header-bar);
            cursor: pointer;
        }

        #volume-slider::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border: none;
            border-radius: 50%;
            background: var(--header-bar);
            cursor: pointer;
        }

        #volume-slider::-moz-range-track {
            background: #333;
            height: 4px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Loading overlay -->
        <div id="loading-overlay">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <div id="loading-text">Click anywhere to start audio engine</div>
            </div>
        </div>

        <!-- Tab bar -->
        <div id="tab-bar">
            <button class="tab active" data-tab="ff7">FF7</button>
            <button class="tab" data-tab="ff9">FF9</button>
            <button class="tab" data-tab="sm64">SM64</button>
            <button class="tab" data-tab="oot">OoT</button>
            <button class="tab" data-tab="ge">GOLDENEYE</button>
        </div>

        <!-- Main content area -->
        <div id="content">
            <!-- Left side: title + keyboard -->
            <div id="left-panel">
                <div id="top-bar">
                    <span id="title">FF7 Soundfont Player</span>
                    <span id="octave-label">Oct: C4</span>
                </div>
                <canvas id="keyboard" width="420" height="200"></canvas>
            </div>

            <!-- Right side: preset list -->
            <div id="preset-list-container">
                <div id="preset-list"></div>
            </div>
        </div>

        <!-- Status bar -->
        <div id="status-bar">
            <span id="status-text">QWERTY: A-L = keys | Z/X = octave | ↑↓ = preset</span>
            <div id="volume-control">
                <button id="panic-btn" title="Kill all notes (Escape)">■</button>
                <span id="volume-icon">♪</span>
                <input type="range" id="volume-slider" min="0" max="100" value="50">
            </div>
        </div>
    </div>

    <script>
    // ================================================================
    // All modules inlined in dependency order:
    //   1. sf2-parser.js
    //   2. sf2-resolver.js
    //   3. sf2-synth.js
    //   4. app-state.js
    //   5. app.js
    // ================================================================

    // ================================================================
    // [1] SF2 Binary Parser — Pure, Stateless
    // ================================================================

    const _textDecoder = new TextDecoder('ascii');

    function parseSF2(buffer) {
        const view = new DataView(buffer);
        let pos = 0;

        function readFourCC() {
            const s = String.fromCharCode(
                view.getUint8(pos), view.getUint8(pos + 1),
                view.getUint8(pos + 2), view.getUint8(pos + 3)
            );
            pos += 4;
            return s;
        }

        function readU32() { const v = view.getUint32(pos, true); pos += 4; return v; }
        function readU16() { const v = view.getUint16(pos, true); pos += 2; return v; }
        function readI16() { const v = view.getInt16(pos, true); pos += 2; return v; }
        function readU8()  { const v = view.getUint8(pos); pos += 1; return v; }
        function readI8()  { const v = view.getInt8(pos); pos += 1; return v; }

        function readString(len) {
            const bytes = new Uint8Array(buffer, pos, len);
            pos += len;
            let end = bytes.indexOf(0);
            if (end < 0) end = len;
            return _textDecoder.decode(bytes.subarray(0, end)).trim();
        }

        const riffId = readFourCC();
        if (riffId !== 'RIFF') throw new Error('Not a RIFF file');
        const riffSize = readU32();
        const sfbk = readFourCC();
        if (sfbk !== 'sfbk') throw new Error('Not an SF2 file');

        let samples = null;
        const presetHeaders = [];
        const presetBags = [];
        const presetGens = [];
        const instHeaders = [];
        const instBags = [];
        const instGens = [];
        const sampleHeaders = [];

        const endPos = 8 + riffSize;

        while (pos < endPos) {
            const chunkId = readFourCC();
            const chunkSize = readU32();
            const chunkEnd = pos + chunkSize;

            if (chunkId === 'LIST') {
                const listType = readFourCC();

                if (listType === 'sdta') {
                    while (pos < chunkEnd) {
                        const subId = readFourCC();
                        const subSize = readU32();

                        if (subId === 'smpl') {
                            samples = _decodePCM16(buffer, pos, subSize);
                            pos += subSize;
                        } else {
                            pos += subSize;
                        }
                    }
                } else if (listType === 'pdta') {
                    while (pos < chunkEnd) {
                        const subId = readFourCC();
                        const subSize = readU32();
                        const subEnd = pos + subSize;

                        if (subId === 'phdr') {
                            while (pos + 38 <= subEnd) {
                                presetHeaders.push({
                                    name: readString(20),
                                    preset: readU16(),
                                    bank: readU16(),
                                    bagIndex: readU16(),
                                    library: readU32(),
                                    genre: readU32(),
                                    morphology: readU32(),
                                });
                            }
                        } else if (subId === 'pbag') {
                            while (pos + 4 <= subEnd) {
                                presetBags.push({
                                    genIndex: readU16(),
                                    modIndex: readU16(),
                                });
                            }
                        } else if (subId === 'pgen') {
                            while (pos + 4 <= subEnd) {
                                presetGens.push({
                                    oper: readU16(),
                                    amount: readI16(),
                                });
                            }
                        } else if (subId === 'inst') {
                            while (pos + 22 <= subEnd) {
                                instHeaders.push({
                                    name: readString(20),
                                    bagIndex: readU16(),
                                });
                            }
                        } else if (subId === 'ibag') {
                            while (pos + 4 <= subEnd) {
                                instBags.push({
                                    genIndex: readU16(),
                                    modIndex: readU16(),
                                });
                            }
                        } else if (subId === 'igen') {
                            while (pos + 4 <= subEnd) {
                                instGens.push({
                                    oper: readU16(),
                                    amount: readI16(),
                                });
                            }
                        } else if (subId === 'shdr') {
                            while (pos + 46 <= subEnd) {
                                const name = readString(20);
                                const start = readU32();
                                const end = readU32();
                                const startLoop = readU32();
                                const endLoop = readU32();
                                const sampleRate = readU32();
                                const originalKey = readU8();
                                const correction = readI8();
                                const sampleLink = readU16();
                                const sampleType = readU16();

                                sampleHeaders.push({
                                    name, start, end, startLoop, endLoop,
                                    sampleRate, originalKey, correction,
                                    sampleLink, sampleType,
                                });
                            }
                        }

                        pos = subEnd;
                    }
                } else {
                    pos = chunkEnd;
                }
            } else {
                pos = chunkEnd;
            }

            if (pos % 2 !== 0) pos++;
        }

        if (presetHeaders.length > 0) presetHeaders.pop();
        if (instHeaders.length > 0) instHeaders.pop();
        if (sampleHeaders.length > 0) sampleHeaders.pop();

        return {
            samples,
            presetHeaders,
            presetBags,
            presetGens,
            instHeaders,
            instBags,
            instGens,
            sampleHeaders,
        };
    }

    function _decodePCM16(buffer, offset, byteLength) {
        const numSamples = byteLength / 2;
        const output = new Float32Array(numSamples);
        const SCALE = 1.0 / 32768.0;

        if (offset % 2 === 0) {
            const int16View = new Int16Array(buffer, offset, numSamples);
            for (let i = 0; i < numSamples; i++) {
                output[i] = int16View[i] * SCALE;
            }
        } else {
            const view = new DataView(buffer);
            for (let i = 0; i < numSamples; i++) {
                output[i] = view.getInt16(offset + i * 2, true) * SCALE;
            }
        }

        return output;
    }

    // ================================================================
    // [2] SF2 Zone Resolver — Pure Logic
    // ================================================================

    const GEN = {
        startAddrsOffset: 0,
        endAddrsOffset: 1,
        startloopAddrsOffset: 2,
        endloopAddrsOffset: 3,
        startAddrsCoarseOffset: 4,
        endAddrsCoarseOffset: 12,
        pan: 17,
        initialAttenuation: 48,
        attackVolEnv: 33,
        holdVolEnv: 34,
        decayVolEnv: 35,
        sustainVolEnv: 36,
        releaseVolEnv: 37,
        instrument: 41,
        keyRange: 43,
        velRange: 44,
        startloopAddrsCoarseOffset: 45,
        keynum: 46,
        endloopAddrsCoarseOffset: 50,
        coarseTune: 51,
        fineTune: 52,
        sampleID: 53,
        sampleModes: 54,
        scaleTuning: 56,
        overridingRootKey: 58,
    };

    function buildGenMap(gens, startIdx, endIdx) {
        const map = new Map();
        for (let i = startIdx; i < endIdx; i++) {
            map.set(gens[i].oper, gens[i].amount);
        }
        return map;
    }

    function genVal(map, genId, defaultVal) {
        const v = map.get(genId);
        return v !== undefined ? v : defaultVal;
    }

    function noteInKeyRange(map, midiNote) {
        const amount = map.get(GEN.keyRange);
        if (amount !== undefined) {
            return midiNote >= (amount & 0xFF) && midiNote <= ((amount >> 8) & 0xFF);
        }
        return true;
    }

    function resolvePresetZones(sf2, presetIndex, midiNote) {
        const ph = sf2.presetHeaders[presetIndex];
        if (!ph) return [];

        const nextPh = sf2.presetHeaders[presetIndex + 1];
        const bagStart = ph.bagIndex;
        const bagEnd = nextPh ? nextPh.bagIndex : sf2.presetBags.length;

        const results = [];

        for (let bi = bagStart; bi < bagEnd; bi++) {
            const bag = sf2.presetBags[bi];
            const nextBag = sf2.presetBags[bi + 1];
            const genStart = bag.genIndex;
            const genEnd = nextBag ? nextBag.genIndex : sf2.presetGens.length;

            const pMap = buildGenMap(sf2.presetGens, genStart, genEnd);

            if (!noteInKeyRange(pMap, midiNote)) continue;

            const instIdx = genVal(pMap, GEN.instrument, -1);
            if (instIdx < 0 || instIdx >= sf2.instHeaders.length) continue;

            const pCoarseTune = genVal(pMap, GEN.coarseTune, 0);
            const pFineTune = genVal(pMap, GEN.fineTune, 0);

            const inst = sf2.instHeaders[instIdx];
            const nextInst = sf2.instHeaders[instIdx + 1];
            const iBagStart = inst.bagIndex;
            const iBagEnd = nextInst ? nextInst.bagIndex : sf2.instBags.length;

            for (let ibi = iBagStart; ibi < iBagEnd; ibi++) {
                const ibag = sf2.instBags[ibi];
                const nextIBag = sf2.instBags[ibi + 1];
                const iGenStart = ibag.genIndex;
                const iGenEnd = nextIBag ? nextIBag.genIndex : sf2.instGens.length;

                const iMap = buildGenMap(sf2.instGens, iGenStart, iGenEnd);

                if (!noteInKeyRange(iMap, midiNote)) continue;

                const sampleIdx = genVal(iMap, GEN.sampleID, -1);
                if (sampleIdx < 0 || sampleIdx >= sf2.sampleHeaders.length) continue;

                const shdr = sf2.sampleHeaders[sampleIdx];
                if (shdr.sampleType & 0x8000) continue;

                const rootKey = genVal(iMap, GEN.overridingRootKey, -1);
                const coarseTune = genVal(iMap, GEN.coarseTune, 0) + pCoarseTune;
                const fineTune = genVal(iMap, GEN.fineTune, 0) + pFineTune;
                const scaleTuning = genVal(iMap, GEN.scaleTuning, 100);
                const sampleModes = genVal(iMap, GEN.sampleModes, 0);
                const pan = genVal(iMap, GEN.pan, 0);
                const attenuation = genVal(iMap, GEN.initialAttenuation, 0);
                const releaseVolEnv = genVal(iMap, GEN.releaseVolEnv, -12000);

                const startOff = genVal(iMap, GEN.startAddrsOffset, 0)
                               + genVal(iMap, GEN.startAddrsCoarseOffset, 0) * 32768;
                const endOff   = genVal(iMap, GEN.endAddrsOffset, 0)
                               + genVal(iMap, GEN.endAddrsCoarseOffset, 0) * 32768;
                const loopStartOff = genVal(iMap, GEN.startloopAddrsOffset, 0)
                                   + genVal(iMap, GEN.startloopAddrsCoarseOffset, 0) * 32768;
                const loopEndOff   = genVal(iMap, GEN.endloopAddrsOffset, 0)
                                   + genVal(iMap, GEN.endloopAddrsCoarseOffset, 0) * 32768;

                results.push({
                    shdr,
                    rootKey: rootKey >= 0 ? rootKey : shdr.originalKey,
                    coarseTune,
                    fineTune,
                    scaleTuning,
                    sampleModes,
                    pan,
                    attenuation,
                    releaseVolEnv,
                    startOff,
                    endOff,
                    loopStartOff,
                    loopEndOff,
                });
            }
        }

        return results;
    }

    // ================================================================
    // [3] SF2 Web Audio Synthesizer — Stateful Audio Engine
    // ================================================================

    class SF2Synth {
        constructor(audioContext) {
            this.ctx = audioContext;
            this.sf2Data = [];
            this.activeVoices = new Map();
            this.masterGain = this.ctx.createGain();
            this.masterGain.gain.value = 1.0;
            this.masterGain.connect(this.ctx.destination);

            this.currentSf2Index = 0;
            this.currentPresetIndex = 0;

            this._offsets = [];
            this._totalPresets = 0;

            this._bufferCache = new Map();
            this._zoneCache = new Map();
        }

        addSF2(parsed, label) {
            this.sf2Data.push({ parsed, label });
            this._rebuildOffsets();
        }

        _rebuildOffsets() {
            this._offsets.length = this.sf2Data.length;
            let total = 0;
            for (let i = 0; i < this.sf2Data.length; i++) {
                this._offsets[i] = total;
                total += this.sf2Data[i].parsed.presetHeaders.length;
            }
            this._totalPresets = total;
        }

        getPresetCount() {
            return this._totalPresets;
        }

        _resolveToSf(globalIndex) {
            for (let i = this._offsets.length - 1; i >= 0; i--) {
                if (globalIndex >= this._offsets[i]) {
                    return { sfIdx: i, local: globalIndex - this._offsets[i] };
                }
            }
            return null;
        }

        getPresetName(globalIndex) {
            const r = this._resolveToSf(globalIndex);
            if (!r) return '(unknown)';
            return this.sf2Data[r.sfIdx].parsed.presetHeaders[r.local].name;
        }

        getPresetLabel(globalIndex) {
            const r = this._resolveToSf(globalIndex);
            if (!r) return '';
            return this.sf2Data[r.sfIdx].label;
        }

        getSf2Count() { return this.sf2Data.length; }

        getSf2Label(sfIdx) { return this.sf2Data[sfIdx]?.label || ''; }

        getSf2PresetCount(sfIdx) {
            return this.sf2Data[sfIdx]?.parsed.presetHeaders.length || 0;
        }

        getGlobalIndex(sfIdx, localIdx) {
            return this._offsets[sfIdx] + localIdx;
        }

        _resolve(globalIndex) {
            const r = this._resolveToSf(globalIndex);
            if (!r) return null;
            return { sfIdx: r.sfIdx, localPreset: r.local };
        }

        setPreset(globalIndex) {
            const r = this._resolve(globalIndex);
            if (!r) return;
            this.currentSf2Index = r.sfIdx;
            this.currentPresetIndex = r.localPreset;
            this._zoneCache.clear();
        }

        noteOn(midiNote, velocity = 0.8) {
            const sf2 = this.sf2Data[this.currentSf2Index];
            if (!sf2) return;

            const zoneKey = `${this.currentSf2Index}-${this.currentPresetIndex}-${midiNote}`;
            let zones = this._zoneCache.get(zoneKey);
            if (!zones) {
                zones = resolvePresetZones(sf2.parsed, this.currentPresetIndex, midiNote);
                this._zoneCache.set(zoneKey, zones);
            }
            if (zones.length === 0) return;

            let bucket = this.activeVoices.get(midiNote);
            if (!bucket) {
                bucket = [];
                this.activeVoices.set(midiNote, bucket);
            }

            for (let i = 0; i < zones.length; i++) {
                const voice = this._createVoice(sf2.parsed, zones[i], midiNote, velocity, this.currentSf2Index);
                if (voice) bucket.push(voice);
            }
        }

        noteOff(midiNote) {
            const voices = this.activeVoices.get(midiNote);
            if (!voices) return;

            const now = this.ctx.currentTime;

            for (let i = 0; i < voices.length; i++) {
                const voice = voices[i];
                const releaseSec = Math.min(Math.pow(2, voice.releaseVolEnv / 1200), 5.0);
                voice.gain.gain.cancelScheduledValues(now);
                voice.gain.gain.setValueAtTime(voice.gain.gain.value, now);
                voice.gain.gain.linearRampToValueAtTime(0, now + releaseSec);
                voice.source.stop(now + releaseSec + 0.05);
            }

            this.activeVoices.delete(midiNote);
        }

        allNotesOff() {
            const now = this.ctx.currentTime;

            for (const [, voices] of this.activeVoices) {
                for (let i = 0; i < voices.length; i++) {
                    const v = voices[i];
                    v.gain.gain.cancelScheduledValues(now);
                    v.gain.gain.setValueAtTime(0, now);
                    try { v.source.stop(now + 0.01); } catch (_) {}
                }
            }

            this.activeVoices.clear();
        }

        _createVoice(parsed, zone, midiNote, velocity, sfIdx) {
            const { shdr, rootKey, coarseTune, fineTune, scaleTuning, sampleModes,
                    pan, attenuation, releaseVolEnv, startOff, endOff,
                    loopStartOff, loopEndOff } = zone;

            if (!parsed.samples) return null;

            const sampleStart = shdr.start + startOff;
            const sampleEnd = shdr.end + endOff;
            const loopStart = shdr.startLoop + loopStartOff;
            const loopEnd = shdr.endLoop + loopEndOff;

            const sampleLen = sampleEnd - sampleStart;
            if (sampleLen <= 0) return null;

            const MIN_RATE = 8000, MAX_RATE = 96000;
            const nativeSR = shdr.sampleRate;
            const safeSR = Math.max(MIN_RATE, Math.min(MAX_RATE, nativeSR));
            const rateRatio = nativeSR / safeSR;

            const cacheKey = `${sfIdx}-${shdr.start}-${shdr.end}-${startOff}-${endOff}-${safeSR}`;
            let buf = this._bufferCache.get(cacheKey);

            if (!buf) {
                buf = this.ctx.createBuffer(1, sampleLen, safeSR);
                const channelData = buf.getChannelData(0);

                const srcStart = sampleStart;
                const srcEnd = Math.min(sampleStart + sampleLen, parsed.samples.length);
                const copyLen = srcEnd - srcStart;

                if (copyLen > 0) {
                    channelData.set(parsed.samples.subarray(srcStart, srcEnd));
                }

                this._bufferCache.set(cacheKey, buf);
            }

            const source = this.ctx.createBufferSource();
            source.buffer = buf;

            const loop = (sampleModes & 1) !== 0;
            if (loop && loopEnd > loopStart) {
                source.loop = true;
                source.loopStart = (loopStart - sampleStart) / safeSR;
                source.loopEnd = (loopEnd - sampleStart) / safeSR;
            }

            const semitones = (midiNote - rootKey) * (scaleTuning / 100) + coarseTune + fineTune / 100;
            source.playbackRate.value = Math.pow(2, semitones / 12) * rateRatio;

            const gain = this.ctx.createGain();
            const attenuationDb = attenuation / 10;
            const vol = velocity * Math.pow(10, -attenuationDb / 20);
            gain.gain.value = Math.min(vol, 1.0);

            let panNode = null;
            if (pan !== 0 && this.ctx.createStereoPanner) {
                panNode = this.ctx.createStereoPanner();
                panNode.pan.value = Math.max(-1, Math.min(1, pan / 500));
                source.connect(gain);
                gain.connect(panNode);
                panNode.connect(this.masterGain);
            } else {
                source.connect(gain);
                gain.connect(this.masterGain);
            }

            const now = this.ctx.currentTime;
            source.start(now);

            if (!loop) {
                const duration = sampleLen / nativeSR / source.playbackRate.value;
                source.stop(this.ctx.currentTime + duration + 0.1);
            }

            return { source, gain, panNode, releaseVolEnv };
        }

        clearBufferCache() {
            this._bufferCache.clear();
        }
    }

    // ================================================================
    // [4] App State Manager — Centralized, Observable
    // ================================================================

    class AppState {
        constructor(themeKeys) {
            this.audioCtx = null;
            this.activeTab = 'ff7';
            this.qwertyOctave = 4;
            this.pressedKeys = new Map();   // currently-held QWERTY key → MIDI note
            this.heldNotes = new Set();
            this.activeNoteClasses = new Set();

            this.tabStates = {};
            for (const key of themeKeys) {
                this.tabStates[key] = {
                    synth: null,
                    selectedPreset: 0,
                    loaded: false,
                    loading: false,
                };
            }

            this._listeners = new Map();
        }

        on(event, fn) {
            if (!this._listeners.has(event)) {
                this._listeners.set(event, []);
            }
            this._listeners.get(event).push(fn);
        }

        emit(event, data) {
            const fns = this._listeners.get(event);
            if (fns) {
                for (let i = 0; i < fns.length; i++) {
                    fns[i](data);
                }
            }
        }

        get currentTabState() {
            return this.tabStates[this.activeTab];
        }

        get currentSynth() {
            return this.tabStates[this.activeTab]?.synth || null;
        }

        refreshNoteClasses() {
            this.activeNoteClasses.clear();
            for (const note of this.heldNotes) {
                this.activeNoteClasses.add(note % 12);
            }
        }

        addHeldNote(midiNote) {
            this.heldNotes.add(midiNote);
            this.activeNoteClasses.add(midiNote % 12);
            this.emit('note-change');
        }

        removeHeldNote(midiNote) {
            this.heldNotes.delete(midiNote);
            this.refreshNoteClasses();
            this.emit('note-change');
        }

        clearAllNotes() {
            this.heldNotes.clear();
            this.activeNoteClasses.clear();
            this.emit('note-change');
        }

        changeOctave(delta) {
            const next = this.qwertyOctave + delta;
            if (next >= 0 && next <= 8) {
                this.qwertyOctave = next;
                this.emit('octave-change');
            }
        }

        setSelectedPreset(tabId, presetIndex) {
            const ts = this.tabStates[tabId];
            if (!ts) return;
            ts.selectedPreset = presetIndex;
            this.emit('preset-change', { tabId, presetIndex });
        }

        setActiveTab(tabId) {
            if (tabId === this.activeTab) return false;
            this.activeTab = tabId;
            this.emit('tab-change', { tabId });
            return true;
        }
    }

    // ================================================================

    // ================================================================
    async function initAudio() {
        $loadingText.textContent = 'Initializing audio...';
        state.audioCtx = new AudioContext({ latencyHint: 'interactive' });

        const warmBuf = state.audioCtx.createBuffer(1, 1, state.audioCtx.sampleRate);
        const warmSrc = state.audioCtx.createBufferSource();
        warmSrc.buffer = warmBuf;
        warmSrc.connect(state.audioCtx.destination);
        warmSrc.start();

        $overlay.classList.add('hidden');

    // ================================================================
    // Soundfont Loading — per-tab isolated synths
    // ================================================================
    async function loadTabSoundfonts(tabId) {
        const ts = state.tabStates[tabId];
        const theme = THEMES[tabId];

        if (ts.loaded || ts.loading) return;
        ts.loading = true;

        ts.synth = new SF2Synth(state.audioCtx);
        ts.synth.masterGain.gain.value = masterVolume;

        for (const sf of theme.soundfonts) {
            $loadingText.textContent = `Loading ${sf.label}...`;
            try {
                const resp = await fetch(sf.path);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const buf = await resp.arrayBuffer();
                const parsed = parseSF2(buf);
                ts.synth.addSF2(parsed, sf.label);
                console.log(`Loaded ${sf.label}: ${parsed.presetHeaders.length} presets`);
            } catch (err) {
                console.error(`Failed to load ${sf.path}:`, err);
            }
        }

        ts.loaded = true;
        ts.loading = false;

        if (ts.synth.getPresetCount() > 0) {
            const DEFAULT_PRESETS = { ff7: 60, ff9: 67, sm64: 5, ge: 53 };
            const defaultPreset = DEFAULT_PRESETS[tabId] ?? 0;
            selectPreset(tabId, defaultPreset);
        }
    }

    // ================================================================
    // Preset Management
    // ================================================================

    function selectPreset(tabId, presetIndex) {
        const ts = state.tabStates[tabId];
        if (!ts.synth) return;
        if (presetIndex < 0 || presetIndex >= ts.synth.getPresetCount()) return;

        ts.synth.setPreset(presetIndex);
        ts.synth.allNotesOff();

        state.clearAllNotes();

        state.setSelectedPreset(tabId, presetIndex);

        if (tabId === state.activeTab) {
            renderPresetList();
            markKeyboardDirty();
        }
    }

    // ================================================================
    // Preset Row Cache
    // ================================================================
    let _cachedPresetRows = null;
    let _cachedPresetRowsTab = null;

    function getCachedPresetRows(tabId) {
        if (_cachedPresetRowsTab !== tabId) {
            _cachedPresetRows = buildPresetRows(tabId);
            _cachedPresetRowsTab = tabId;
        }
        return _cachedPresetRows;
    }

    function invalidatePresetRowsCache() {
        _cachedPresetRows = null;
        _cachedPresetRowsTab = null;
    }

    function selectAdjacentPreset(direction) {
        const ts = state.currentTabState;
        if (!ts.synth) return;

        const rows = getCachedPresetRows(state.activeTab);
        let currentRowIdx = -1;
        for (let i = 0; i < rows.length; i++) {
            if (!rows[i].isCategory && rows[i].presetIndex === ts.selectedPreset) {
                currentRowIdx = i;
                break;
            }
        }
        if (currentRowIdx < 0) return;

        let r = currentRowIdx + direction;
        while (r >= 0 && r < rows.length) {
            if (!rows[r].isCategory) {
                selectPreset(state.activeTab, rows[r].presetIndex);
                scrollToSelected();
                return;
            }
            r += direction;
        }
    }

    function buildPresetRows(tabId) {
        const ts = state.tabStates[tabId];
        const theme = THEMES[tabId];
        const synth = ts.synth;
        if (!synth) return [];

        const rows = [];

        if (theme.categories) {
            for (const cat of theme.categories) {
                rows.push({ isCategory: true, text: cat.name, presetIndex: -1 });
                for (const idx of cat.indices) {
                    if (idx < synth.getPresetCount()) {
                        rows.push({
                            isCategory: false,
                            text: synth.getPresetName(idx),
                            presetIndex: idx
                        });
                    }
                }
            }
        } else {
            for (let si = 0; si < synth.getSf2Count(); si++) {
                const sfLabel = synth.getSf2Label(si);
                const sfCount = synth.getSf2PresetCount(si);

                rows.push({ isCategory: true, text: sfLabel, presetIndex: -1 });
                for (let p = 0; p < sfCount; p++) {
                    const globalIdx = synth.getGlobalIndex(si, p);
                    const name = synth.getPresetName(globalIdx);
                    if (name && name !== '(unnamed)') {
                        rows.push({
                            isCategory: false,
                            text: name,
                            presetIndex: globalIdx
                        });
                    }
                }
            }
        }

        return rows;
    }

    // ================================================================
    // Note Control
    // ================================================================

    function noteOn(midiNote, velocity = 100) {
        const synth = state.currentSynth;
        if (!synth) return;
        synth.noteOn(midiNote, velocity / 127);
        state.addHeldNote(midiNote);
    }

    function noteOff(midiNote) {
        const synth = state.currentSynth;
        if (!synth) return;
        synth.noteOff(midiNote);
        state.removeHeldNote(midiNote);
    }

    function allNotesOff(previousTabId) {
        if (previousTabId && state.tabStates[previousTabId]?.synth) {
            state.tabStates[previousTabId].synth.allNotesOff();
        }
        const synth = state.currentSynth;
        if (synth) synth.allNotesOff();

        state.pressedKeys.clear();
        state.clearAllNotes();
    }

    function getMidiNote(key) {
        const offset = QWERTY_MAP[key];
        if (offset === undefined) return -1;
        return (state.qwertyOctave + 1) * 12 + offset;
    }

    // ================================================================
    // Keyboard Drawing (Canvas) — with rAF coalescing
    // ================================================================

    let _keyboardDirty = false;

    function markKeyboardDirty() {
        if (!_keyboardDirty) {
            _keyboardDirty = true;
            requestAnimationFrame(() => {
                _keyboardDirty = false;
                drawKeyboard();
            });
        }
    }

    function drawKeyboard() {
        const w = $canvas.width;
        const h = $canvas.height;
        if (w <= 0 || h <= 0) return;

        const theme = THEMES[state.activeTab];
        const kbStyle = theme.keyboardStyle;

        const pad = 6;
        const kx0 = pad, ky0 = pad;
        const kw = w - pad * 2, kh = h - pad * 2;
        const numWhite = 7;
        const whiteW = Math.floor(kw / numWhite);
        const blackW = Math.floor(whiteW * 0.55);
        const blackH = Math.floor(kh * 0.58);
        const gap = 2;

        canvasCtx.clearRect(0, 0, w, h);
        canvasCtx.fillStyle = cachedBgColor;
        canvasCtx.fillRect(0, 0, w, h);

        if (kbStyle === 'ff7') {
            const grad = canvasCtx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h)/2);
            grad.addColorStop(0, cachedKbMid);
            grad.addColorStop(1, cachedKbDark);
            canvasCtx.fillStyle = grad;
            canvasCtx.fillRect(2, 2, w - 4, h - 4);
            canvasCtx.strokeStyle = cachedKbStroke;
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeRect(2, 2, w - 4, h - 4);
            canvasCtx.strokeStyle = cachedKbBorder;
            canvasCtx.lineWidth = 1;
            canvasCtx.strokeRect(5, 5, w - 10, h - 10);
        }

        const activeClasses = state.activeNoteClasses;

        // White keys
        for (let i = 0; i < numWhite; i++) {
            const nc = WHITE_NOTES[i];
            const pressed = activeClasses.has(nc);
            const x = kx0 + i * whiteW + gap;
            const y = ky0 + gap;
            const kwk = whiteW - gap * 2;
            const khk = kh - gap * 2;

            if (pressed) {
                canvasCtx.fillStyle = kbStyle === 'ff7' ? cachedKbBorder : cachedHighlightColor;
            } else if (kbStyle === 'ff7') {
                const g = canvasCtx.createLinearGradient(x, y, x + kwk, y + khk);
                g.addColorStop(0, cachedKbDark);
                g.addColorStop(1, cachedKbMid);
                canvasCtx.fillStyle = g;
            } else {
                canvasCtx.fillStyle = '#FFFFFF';
            }
            canvasCtx.fillRect(x, y, kwk, khk);

            canvasCtx.strokeStyle = kbStyle === 'ff7' ? cachedKbStroke : '#000000';
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeRect(x, y, kwk, khk);

            canvasCtx.fillStyle = pressed
                ? (kbStyle === 'ff7' ? cachedKbStroke : '#000000')
                : (kbStyle === 'ff7' ? cachedKbBorder : '#000000');
            canvasCtx.font = `${pressed ? 16 : 14}px sans-serif`;
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'bottom';
            canvasCtx.fillText(KEY_LABELS[nc] || '', x + kwk / 2, y + khk - 8);
        }

        // Black keys
        for (let i = 0; i < BLACK_KEYS.length; i++) {
            const bk = BLACK_KEYS[i];
            const pressed = activeClasses.has(bk.noteClass);
            const x = kx0 + (bk.after + 1) * whiteW - blackW / 2;
            const y = ky0 + gap;

            if (pressed) {
                canvasCtx.fillStyle = kbStyle === 'ff7' ? cachedKbBorder : cachedHighlightColor;
            } else if (kbStyle === 'ff7') {
                const g = canvasCtx.createLinearGradient(x, y, x + blackW, y + blackH);
                g.addColorStop(0, '#000000');
                g.addColorStop(1, cachedKbDark);
                canvasCtx.fillStyle = g;
            } else {
                canvasCtx.fillStyle = '#000000';
            }
            canvasCtx.fillRect(x, y, blackW, blackH);

            canvasCtx.strokeStyle = kbStyle === 'ff7' ? cachedKbStroke : (pressed ? '#000' : '#FFFFFF');
            canvasCtx.lineWidth = kbStyle === 'ff7' ? 2 : 1;
            canvasCtx.strokeRect(x, y, blackW, blackH);

            canvasCtx.fillStyle = pressed
                ? (kbStyle === 'ff7' ? cachedKbStroke : '#000000')
                : '#FFFFFF';
            canvasCtx.font = `${pressed ? 12 : 10}px sans-serif`;
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'bottom';
            canvasCtx.fillText(KEY_LABELS[bk.noteClass] || '', x + blackW / 2, y + blackH - 4);
        }
    }

    // ================================================================
    // Preset List Rendering — with DOM diffing for selection
    // ================================================================

    let _presetListBuiltForTab = null;

    function renderPresetList() {
        const ts = state.currentTabState;
        const tabId = state.activeTab;

        if (_presetListBuiltForTab !== tabId) {
            _fullRebuildPresetList(tabId, ts);
            _presetListBuiltForTab = tabId;
        } else {
            _updatePresetSelection(ts.selectedPreset);
        }
    }

    function _fullRebuildPresetList(tabId, ts) {
        const rows = getCachedPresetRows(tabId);

        const frag = document.createDocumentFragment();

        for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            const el = document.createElement('div');
            el.className = 'preset-row';

            if (row.isCategory) {
                el.classList.add('category');
                el.textContent = row.text;
            } else {
                el.textContent = row.text;
                el.dataset.idx = row.presetIndex;

                if (row.presetIndex === ts.selectedPreset) {
                    el.classList.add('selected');
                }
                el.addEventListener('click', () => {
                    selectPreset(state.activeTab, row.presetIndex);
                });
            }

            frag.appendChild(el);
        }

        $presetList.innerHTML = '';
        $presetList.appendChild(frag);
    }

    function _updatePresetSelection(newIndex) {
        const prev = $presetList.querySelector('.preset-row.selected');
        if (prev) prev.classList.remove('selected');

        const target = $presetList.querySelector(`[data-idx="${newIndex}"]`);
        if (target) target.classList.add('selected');
    }

    function scrollToSelected() {
        requestAnimationFrame(() => {
            const selected = $presetList.querySelector('.selected');
            if (selected) {
                selected.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        });
    }

    // ================================================================
    // Tab Switching
    // ================================================================
    async function switchTab(tabId) {
        if (tabId === state.activeTab) return;

        const previousTab = state.activeTab;
        allNotesOff(previousTab);

        state.setActiveTab(tabId);
        $app.setAttribute('data-theme', tabId);

        requestAnimationFrame(() => refreshCSSVarsCache());

        for (let i = 0; i < _tabElements.length; i++) {
            _tabElements[i].classList.toggle('active', _tabElements[i].dataset.tab === tabId);
        }

        $title.textContent = THEMES[tabId].title;
        updateOctaveLabel();

        if (!state.tabStates[tabId].loaded) {
            $overlay.classList.remove('hidden');
            await loadTabSoundfonts(tabId);
            $overlay.classList.add('hidden');
        }

        _presetListBuiltForTab = null;
        invalidatePresetRowsCache();
        renderPresetList();
        markKeyboardDirty();
    }

    function updateOctaveLabel() {
        $octaveLabel.textContent = `Oct: C${state.qwertyOctave}`;
    }

    // ================================================================
    // State Event Subscriptions
    // ================================================================

    state.on('note-change', () => markKeyboardDirty());

    // Octave change: re-voice any held keys at the new octave
    state.on('octave-change', () => {
        updateOctaveLabel();
        revoiceHeldKeys();
    });

    // ================================================================
    // Keyboard Input
    // ================================================================

    /**
     * Re-voice all currently held keys at the new octave.
     * Stops the old MIDI notes and triggers new ones, keeping
     * pressedKeys in sync with the actual sounding notes.
     */
    function revoiceHeldKeys() {
        if (!state.currentSynth) return;
        if (state.pressedKeys.size === 0) return;

        const entries = Array.from(state.pressedKeys.entries());
        for (const [key, oldMidi] of entries) {
            noteOff(oldMidi);
            const newMidi = getMidiNote(key);
            if (newMidi >= 0 && newMidi <= 127) {
                state.pressedKeys.set(key, newMidi);
                noteOn(newMidi);
            } else {
                state.pressedKeys.delete(key);
            }
        }
    }

    document.addEventListener('keydown', (e) => {
        if (!state.currentSynth) return;
        if (e.repeat) return;

        const key = e.key.toLowerCase();

        if (key === 'z') {
            state.changeOctave(-1);
            e.preventDefault();
            return;
        }
        if (e.key === 'Escape') {
            panicKill();
            e.preventDefault();
            return;
        }

        if (key === 'x') {
            state.changeOctave(1);
            e.preventDefault();
            return;
        }

        if (e.key === 'ArrowUp') {
            selectAdjacentPreset(-1);
            e.preventDefault();
            return;
        }
        if (e.key === 'ArrowDown') {
            selectAdjacentPreset(1);
            e.preventDefault();
            return;
        }

        const midiNote = getMidiNote(key);
        if (midiNote >= 0 && midiNote <= 127 && !state.pressedKeys.has(key)) {
            state.pressedKeys.set(key, midiNote);
            noteOn(midiNote);
            e.preventDefault();
        }
    });

    document.addEventListener('keyup', (e) => {
        if (!state.currentSynth) return;
        const key = e.key.toLowerCase();

        if (state.pressedKeys.has(key)) {
            const midiNote = state.pressedKeys.get(key);
            state.pressedKeys.delete(key);
            noteOff(midiNote);
        }
    });

    // ================================================================
    // Init
    // ================================================================
    $app.setAttribute('data-theme', 'ff7');

    const _tabElements = Array.from(document.querySelectorAll('.tab'));
    _tabElements.forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });

    let _audioInitialized = false;

    async function startApp() {
        if (_audioInitialized) return;
        _audioInitialized = true;
        $loadingText.textContent = 'Initializing...';
        await initAudio();
        refreshCSSVarsCache();
        renderPresetList();
        drawKeyboard();
    }

    startApp();
    $overlay.addEventListener('click', () => startApp());

    function resizeCanvas() {
        const rect = $canvas.parentElement.getBoundingClientRect();
        const topBarH = 28;
        const pad = 12;
        $canvas.width = Math.floor(rect.width - pad);
        $canvas.height = Math.floor(rect.height - topBarH - pad);
        drawKeyboard();
    }

    let _resizeTimer = 0;
    window.addEventListener('resize', () => {
        clearTimeout(_resizeTimer);
        _resizeTimer = setTimeout(resizeCanvas, 150);
    });

    requestAnimationFrame(() => {
        resizeCanvas();
        refreshCSSVarsCache();
        drawKeyboard();
        updateOctaveLabel();
    });
    </script>
</body>
</html>
