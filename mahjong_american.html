    }

    function showClaimControls(options, canMJ) {
        const controls = document.getElementById('claim-controls');
        controls.classList.remove('hidden');

        const hasPung = options.some(o => o.type === 'pung');
        const hasKong = options.some(o => o.type === 'kong');
        const hasQuint = options.some(o => o.type === 'quint');

        document.getElementById('btn-claim-pung').classList.toggle('hidden', !hasPung);
        document.getElementById('btn-claim-kong').classList.toggle('hidden', !hasKong);
        document.getElementById('btn-claim-quint').classList.toggle('hidden', !hasQuint);
        document.getElementById('btn-claim-mahjong').classList.toggle('hidden', !canMJ);
    }

    function humanClaim(type) {
        document.getElementById('claim-controls').classList.add('hidden');
        if (!game || game.phase !== G.PHASE.CLAIM_WINDOW) return;

        if (type === 'mahjong') {
            G.executeMahjong(game, 0);
            return;
        }

        const options = G.getClaimOptions(game, 0);
        const opt = options.find(o => o.type === type);
        if (!opt) return;

        // Human claim + any bot claims — resolve priority
        const allClaims = [{ ...opt, playerIndex: 0 }, ...(game._pendingBotClaims || [])];
        const winner = G.resolveClaims(game, allClaims);

        if (winner && winner.playerIndex === 0) {
            G.executeClaim(game, 0, opt.type, opt.tiles);
        } else if (winner) {
            // Bot claim takes priority
            if (winner.type === 'mahjong') {
                G.executeMahjong(game, winner.playerIndex);
            } else {
                G.executeClaim(game, winner.playerIndex, winner.type, winner.tiles);
            }
        }
    }

    function humanPass() {
        document.getElementById('claim-controls').classList.add('hidden');
        if (!game) return;
        if (game.phase !== G.PHASE.CLAIM_WINDOW) return;
        resolveBotClaims(game._pendingBotClaims || []);
    }

    function resolveBotClaims(botClaims) {
        if (botClaims.length > 0) {
            const winner = G.resolveClaims(game, botClaims);
            if (winner) {
                if (winner.type === 'mahjong') {
                    scheduleBotAction(() => G.executeMahjong(game, winner.playerIndex));
                } else {
                    scheduleBotAction(() => {
                        G.executeClaim(game, winner.playerIndex, winner.type, winner.tiles);
                    });
                }
                return;
            }
        }
        G.passClaim(game);

        // Next player draws
        // NOTE: passClaim triggers onPhaseChange which already schedules the
        // next action when autoPlayOn is true. Only manually handle draws here
        // when auto-play is OFF to avoid race conditions with _botRunning.
        if (autoPlayOn) return;
        if (!game || game.phase === G.PHASE.GAME_OVER) return;
        const cp = game.currentPlayer;
        if (!game.players[cp].isHuman && game.phase === G.PHASE.TURN_DRAW) {
            scheduleBotAction(() => botDraw(cp));
        } else if (game.players[cp].isHuman && game.phase === G.PHASE.TURN_DRAW) {
            G.drawTile(game);
        }
    }

    // -----------------------------------------------------------------------
    // HUMAN ACTIONS
    // -----------------------------------------------------------------------
    function humanClickTile(idx) {
        if (!game || game.phase !== G.PHASE.TURN_DISCARD || game.currentPlayer !== 0) return;
        const player = game.players[0];
        if (idx < 0 || idx >= player.hand.length) return;

        if (selectedTileIdx === idx) {
            // Double click = discard
            if (player.hand[idx].type === 'joker') return; // can't discard joker
            selectedTileIdx = -1;
            G.discardTile(game, idx);
        } else {
            selectedTileIdx = idx;
            renderAll();
        }
    }

    function humanExchangeJoker(targetPlayer, groupIndex) {
        if (!game || game.phase !== G.PHASE.TURN_DISCARD || game.currentPlayer !== 0) return;
        if (selectedTileIdx < 0) return;
        const player = game.players[0];
        const tile = player.hand[selectedTileIdx];
        if (!tile) return;
        if (!G.canExchangeJoker(game, 0, tile, targetPlayer, groupIndex)) return;
        G.executeJokerExchange(game, 0, tile, targetPlayer, groupIndex);
        selectedTileIdx = -1;
        renderAll();
    }

    // -----------------------------------------------------------------------
    // RENDERING
    // -----------------------------------------------------------------------
    function renderAll() {
        if (!game) return;
        _cachedHint = null; // invalidate per render
        // Clear stale selection when it's not the human's turn to discard
        if (game.phase !== G.PHASE.TURN_DISCARD || game.currentPlayer !== 0) {
            selectedTileIdx = -1;
        }

        // Update header
        document.getElementById('wall-count').textContent = `Wall: ${game.wall.length}`;
        const cp = game.players[game.currentPlayer];
        document.getElementById('turn-indicator').textContent = `${cp.name}'s Turn`;

        // Render each player
        for (let i = 0; i < 4; i++) {
            renderPlayer(i);
        }

        // Render discard pool
        renderDiscardPool();

        // Active player highlight
        const areas = document.querySelectorAll('.player-area');
        for (let i = 0; i < areas.length; i++) {
            areas[i].classList.toggle('active-player', i === game.currentPlayer);
        }

        // Hints
        if (hintsOn) {
            renderHints();
        }
    }

    function renderPlayer(idx) {
        const player = game.players[idx];
        const section = document.getElementById(`player-${idx}`);
        if (!section) return;
        const handEl = section.querySelector('.player-hand');
        const exposedEl = section.querySelector('.player-exposed');
        const countEl = section.querySelector('.tile-count');

        countEl.textContent = `(${player.hand.length} tiles)`;

        // Hand
        handEl.innerHTML = '';
        const isHuman = player.isHuman;
        const showFaceUp = isHuman || autoPlayOn;

        // Get hint suggestion (only compute once per render for human)
        let hintIdx = -1;
        let keepSet = null;
        if (hintsOn && isHuman && game.phase === G.PHASE.TURN_DISCARD && game.currentPlayer === 0) {
            if (!_cachedHint) _cachedHint = Hn.getHintSummary(game, 0);
            const hint = _cachedHint ? _cachedHint.discard : null;
            if (hint) {
                hintIdx = hint.tileIndex;
                if (hint.keepIndices && hint.keepIndices.length > 0) {
                    keepSet = new Set(hint.keepIndices);
                }
            }
        }

        for (let i = 0; i < player.hand.length; i++) {
            const tile = player.hand[i];
            const el = createTileElement(tile, showFaceUp);

            if (isHuman) {
                if (i === selectedTileIdx) el.classList.add('selected');
                if (i === hintIdx) {
                    el.classList.add('hint-glow');
                    const badge = document.createElement('span');
                    badge.className = 'hint-badge';
                    badge.textContent = '▼ DISCARD';
                    el.appendChild(badge);
                }
                // Dim tiles that don't contribute to the target hand
                if (keepSet && !keepSet.has(i) && i !== hintIdx) {
                    el.classList.add('tile-dim');
                }
                el.addEventListener('click', () => humanClickTile(i));
            }

            handEl.appendChild(el);
        }

        // Exposed groups
        exposedEl.innerHTML = '';
        for (let gi = 0; gi < player.exposed.length; gi++) {
            const grp = player.exposed[gi];
            const grpEl = document.createElement('div');
            grpEl.className = 'exposed-group';
            for (const tile of grp.tiles) {
                const tileEl = createTileElement(tile, true);
                // Joker exchange: make jokers in exposed groups clickable
                if (tile.type === 'joker' && selectedTileIdx >= 0
                    && game.phase === G.PHASE.TURN_DISCARD && game.currentPlayer === 0) {
                    const selected = game.players[0].hand[selectedTileIdx];
                    if (selected && G.canExchangeJoker(game, 0, selected, idx, gi)) {
                        tileEl.classList.add('joker-exchangeable');
                        tileEl.addEventListener('click', () => humanExchangeJoker(idx, gi));
                    }
                }
                grpEl.appendChild(tileEl);
            }
            exposedEl.appendChild(grpEl);
        }
    }

    function createTileElement(tile, faceUp) {
        const el = document.createElement('div');

        if (!faceUp) {
            el.className = 'tile tile-back';
            return el;
        }

        let suitClass = '';
        if (tile.type === 'suited') suitClass = `tile-${tile.suit}`;
        else if (tile.type === 'dragon') suitClass = `tile-dragon-${tile.value}`;
        else if (tile.type === 'wind') suitClass = 'tile-wind';
        else if (tile.type === 'joker') suitClass = 'tile-joker';
        else if (tile.type === 'flower') suitClass = 'tile-flower';
        else if (tile.type === 'season') suitClass = 'tile-season';

        el.className = `tile tile-face ${suitClass}`;
        el.innerHTML = `<span class="tile-emoji">${tile.emoji || ''}</span><span class="tile-label">${tile.label || ''}</span>`;
        el.title = `${tile.emoji || ''} ${tile.label || ''}`;
        return el;
    }

    function renderDiscardPool() {
        const pool = document.getElementById('discard-pool');
        pool.innerHTML = '';
        for (const tile of game.discardPool) {
            pool.appendChild(createTileElement(tile, true));
        }
    }

    // -----------------------------------------------------------------------
    // HINTS
    // -----------------------------------------------------------------------
    function toggleHints() {
        hintsOn = !hintsOn;
        document.getElementById('btn-hint').classList.toggle('active', hintsOn);
        document.getElementById('hint-panel').classList.toggle('hidden', !hintsOn);
        renderAll();
    }

    function toggleAutoPlay() {
        autoPlayOn = !autoPlayOn;
        document.getElementById('btn-autoplay').classList.toggle('active', autoPlayOn);
        document.getElementById('btn-autoplay').innerHTML = autoPlayOn ? '⏸ Auto Play' : '▶ Auto Play';

        if (autoPlayOn && game && game.phase !== G.PHASE.GAME_OVER) {
            // Init bot AI for human player
            B.initBot(game, 0);

            // Hide claim controls if showing
            document.getElementById('claim-controls').classList.add('hidden');

            // Kick off the auto-play loop from current state
            renderAll();
            autoPlayKick();
        } else {
            renderAll();
        }
    }

    // Resume auto-play from current game state
    function autoPlayKick() {
        if (!autoPlayOn || !game || game.phase === G.PHASE.GAME_OVER) return;
        const cp = game.currentPlayer;

        if (game.phase === G.PHASE.TURN_DRAW && game.players[cp].isHuman) {
            scheduleBotAction(() => botDraw(cp));
        } else if (game.phase === G.PHASE.TURN_DISCARD && game.players[cp].isHuman) {
            scheduleBotAction(() => botDiscard(cp));
        } else if (game.phase === G.PHASE.CLAIM_WINDOW) {
            scheduleBotAction(() => handleClaimWindow());
        }
    }

    function renderHints() {
        const panel = document.getElementById('hint-panel');
        panel.classList.remove('hidden');
        const content = document.getElementById('hint-content');

        if (!_cachedHint) _cachedHint = Hn.getHintSummary(game, 0);
        const summary = _cachedHint;
        if (!summary) { content.innerHTML = '<em>No hint data available.</em>'; return; }

        let html = '';

        // Closest hands
        if (summary.closestHands && summary.closestHands.length > 0) {
            html += `<div style="margin-bottom:6px"><strong>Top ${summary.closestHands.length} Closest Hands:</strong></div>`;
            for (let i = 0; i < summary.closestHands.length; i++) {
                const h = summary.closestHands[i];
                const typeTag = h.concealed ? '<span style="color:var(--pink)">[C]</span>' : '<span style="color:var(--accent)">[X]</span>';
                const rank = `<span style="color:var(--text-muted);font-size:0.85em">${i + 1}.</span>`;
                html += `<div style="margin-bottom:2px">${rank} <span class="hint-hand">${h.name}</span> — ${h.distance} away — ${h.value}pts ${typeTag}</div>`;
            }
        }

        // Discard advice
        if (summary.discard) {
            html += `<div style="margin-top:8px"><span class="hint-action">▶ ${summary.discard.reason}</span></div>`;

            // Show needed tiles
            if (summary.discard.neededTiles && summary.discard.neededTiles.length > 0) {
                const needed = summary.discard.neededTiles
                    .map(n => `<span class="hint-needed">${n.name}${n.count > 1 ? ' ×' + n.count : ''}</span>`)
                    .join(', ');
                html += `<div style="margin-top:6px"><strong>You need:</strong> ${needed}</div>`;
            }
        }

        // Claim advice
        if (summary.claim) {
            html += `<div style="margin-top:4px"><span class="hint-action">▶ ${summary.claim.reason}</span></div>`;
        }

        content.innerHTML = html || '<em>Waiting for your turn…</em>';
    }

    // -----------------------------------------------------------------------
    // SCORECARD
    // -----------------------------------------------------------------------
    function showScorecard() {
        const modal = document.getElementById('scorecard-modal');
        const body = document.getElementById('scorecard-body');

        const card = H.getScorecard();
        let html = '';
        let currentCat = '';

        for (const h of card) {
            if (h.category !== currentCat) {
                if (currentCat) html += '</div>'; // close previous cat
                currentCat = h.category;
                html += `<div class="scorecard-cat"><h4>${currentCat}</h4>`;
            }
            const typeClass = h.concealed ? 'sc-c' : 'sc-x';
            const typeLabel = h.concealed ? 'C' : 'X';
            html += `<div class="scorecard-hand">
                <span class="sc-pattern">${h.pattern}${h.alt ? ' / ' + h.alt : ''}</span>
                <span class="sc-value ${typeClass}">${h.value}pts ${typeLabel}</span>
            </div>`;
        }
        if (currentCat) html += '</div>';

        body.innerHTML = html;
        modal.classList.remove('hidden');
    }

    function hideScorecard() {
        document.getElementById('scorecard-modal').classList.add('hidden');
    }

    // -----------------------------------------------------------------------
    // GAME OVER
    // -----------------------------------------------------------------------
    function showGameOver() {
        const modal = document.getElementById('gameover-modal');

        if (game.winner !== null && game.winner !== undefined) {
            const w = game.players[game.winner];
            const isHuman = w.isHuman;
            document.getElementById('gameover-title').textContent = isHuman ? '🎉 You Win!' : '😔 ' + w.name + ' Wins';
            document.getElementById('gameover-details').textContent = game.winningHand
                ? `${game.winningHand.cat} — ${game.winningHand.value} points`
                : 'Mahjong!';
            document.getElementById('gameover-hand').textContent = game.winningHand
                ? game.winningHand.display
                : '';
        } else {
            document.getElementById('gameover-title').textContent = '🤝 Wall Game';
            document.getElementById('gameover-details').textContent = 'The wall is empty — no winner this round.';
            document.getElementById('gameover-hand').textContent = '';
        }

        modal.classList.remove('hidden');
    }
})();

    </script>
</body>
