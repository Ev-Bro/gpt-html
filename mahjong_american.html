<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Mahjong — NMJL 2025 (Portable)</title>
    <meta name="description" content="Play American Mahjong against 3 bot opponents with toggleable hints.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
/* style.css — American Mahjong dark premium theme */

:root {
    --bg-dark: #0d1117;
    --bg-card: #161b22;
    --bg-surface: #21262d;
    --bg-hover: #30363d;
    --border: #30363d;
    --border-light: #484f58;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #6e7681;
    --accent: #58a6ff;
    --accent-glow: rgba(88, 166, 255, 0.3);
    --green: #3fb950;
    --green-glow: rgba(63, 185, 80, 0.4);
    --red: #f85149;
    --orange: #d29922;
    --pink: #db61a2;
    --purple: #bc8cff;
    --tile-bg: #f0e6d3;
    --tile-border: #c9b896;
    --tile-text: #1a1a2e;
    --tile-back: #1f6f8b;
    --tile-back-pattern: #2a8fac;
    --tile-shadow: rgba(0,0,0,0.4);
    --tile-selected: #58a6ff;
    --tile-hint: #3fb950;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: var(--font);
    background: var(--bg-dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
}

/* ---- HEADER ---- */
#game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-wrap: wrap;
}

.header-left {
    display: flex;
    align-items: baseline;
    gap: 12px;
}

.header-left h1 {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(135deg, #f85149, #ff9800, #3fb950, #58a6ff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 500;
}

.header-center { display: flex; gap: 10px; align-items: center; }
.header-right { display: flex; gap: 8px; }

.badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
}
.badge.turn {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
}

/* ---- BUTTONS ---- */
.btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-surface);
    color: var(--text);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: var(--font);
}
.btn:hover { background: var(--bg-hover); border-color: var(--border-light); }
.btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
.btn-primary:hover { background: #79c0ff; }
.btn-hint { position: relative; }
.btn-hint.active { background: var(--green); color: #000; border-color: var(--green); }
.btn-autoplay { position: relative; }
.btn-autoplay.active { background: var(--orange); color: #000; border-color: var(--orange); animation: pulse 1.5s ease-in-out infinite; }
.btn-claim { background: var(--purple); color: #000; border-color: var(--purple); font-size: 0.85rem; }
.btn-claim:hover { opacity: 0.85; }
.btn-mahjong {
    background: linear-gradient(135deg, #f85149, #ff9800);
    color: #fff; border: none; font-size: 0.9rem;
    animation: pulse 1.5s ease-in-out infinite;
}
.btn-pass { background: var(--bg-surface); }

/* ---- GAME BOARD ----
 * 5-row grid:
 *   row 1 = top player (West)
 *   row 2 = center (discard pool + claim controls)
 *   row 3 = hint panel (only visible when toggled)
 *   row 4 = human player (You/East)
 * Side players span rows 1–2 only so they don't overlap hints/hand
 */
/* ---- GAME WRAPPER (board + sidebar) ---- */
#game-wrapper {
    display: flex;
    height: calc(100vh - 60px);
}

#game-board {
    display: grid;
    grid-template-columns: 110px 1fr 110px;
    grid-template-rows: auto 1fr auto;
    gap: 6px;
    padding: 8px;
    padding-bottom: 12px;
    flex: 1;
    position: relative;
    min-width: 0;
}

.player-area {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
    position: relative;
    overflow-y: auto;
}

.player-top    { grid-column: 2; grid-row: 1; }
.player-left   { grid-column: 1; grid-row: 1 / 3; display: flex; flex-direction: column; }
.player-right  { grid-column: 3; grid-row: 1 / 3; display: flex; flex-direction: column; }
.player-bottom { grid-column: 1 / 4; grid-row: 3; overflow: visible; }

#center-area {
    grid-column: 2; grid-row: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    padding: 12px;
    overflow-y: auto;
}

.player-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}

.player-name {
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text);
}

.tile-count {
    font-size: 0.7rem;
    color: var(--text-muted);
}

.player-hand {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    min-height: 70px;
    justify-content: center;
}

.player-exposed {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 6px;
    justify-content: center;
}

.exposed-group {
    display: flex;
    gap: 2px;
    padding: 3px;
    background: rgba(88,166,255,0.08);
    border-radius: 6px;
    border: 1px solid rgba(88,166,255,0.15);
}

.tile.joker-exchangeable {
    cursor: pointer;
    border-color: var(--orange) !important;
    box-shadow: 0 0 12px rgba(210, 153, 34, 0.5);
    animation: pulse 1.5s ease-in-out infinite;
}

/* ---- TILES ---- */
.tile {
    width: 46px;
    height: 62px;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: default;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    position: relative;
    user-select: none;
}

.tile-face {
    background: var(--tile-bg);
    border: 2px solid var(--tile-border);
    color: var(--tile-text);
    box-shadow: 0 2px 4px var(--tile-shadow), inset 0 1px 0 rgba(255,255,255,0.6);
}

.tile-back {
    background: linear-gradient(135deg, var(--tile-back), var(--tile-back-pattern));
    border: 2px solid #175a6e;
    box-shadow: 0 2px 4px var(--tile-shadow);
}

.tile-back::after {
    content: '🀄';
    font-size: 0.9rem;
    opacity: 0.4;
}

.tile-label {
    font-size: 0.45rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    opacity: 0.7;
    margin-top: 1px;
}

.tile-emoji {
    font-size: 1.15rem;
    line-height: 1;
}

/* Suit colors on tiles */
.tile-crak .tile-emoji { color: #c0392b; }
.tile-bam .tile-emoji { color: #27ae60; }
.tile-dot .tile-emoji { color: #2980b9; }
.tile-dragon-Red .tile-emoji { color: #e74c3c; }
.tile-dragon-Green .tile-emoji { color: #2ecc71; }
.tile-dragon-White .tile-emoji { color: #95a5a6; }
.tile-wind .tile-emoji { color: #8e44ad; }
.tile-joker { background: linear-gradient(135deg, #f39c12, #e74c3c); border-color: #d68910; }
.tile-joker .tile-emoji { color: #fff; }
.tile-flower .tile-emoji, .tile-season .tile-emoji { color: #e91e63; }

/* Interactive states (human player's tiles) */
.player-bottom .tile-face {
    cursor: pointer;
}
.player-bottom .tile-face:hover {
    transform: translateY(-6px);
    box-shadow: 0 6px 12px var(--tile-shadow);
    border-color: var(--accent);
}
.player-bottom .tile-face.selected {
    transform: translateY(-10px);
    border-color: var(--tile-selected);
    box-shadow: 0 0 12px var(--accent-glow);
}
.player-bottom .tile-face.hint-glow {
    border-color: var(--tile-hint);
    box-shadow: 0 0 16px var(--green-glow);
    transform: translateY(-8px);
    animation: hint-pulse 1.5s ease-in-out infinite;
}

@keyframes hint-pulse {
    0%, 100% { box-shadow: 0 0 12px var(--green-glow); }
    50% { box-shadow: 0 0 24px var(--green-glow), 0 0 40px rgba(63, 185, 80, 0.15); }
}

.hint-badge {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: #000;
    font-size: 0.5rem;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 0.5px;
}

/* Side player tiles (vertical) */
.player-left .player-hand,
.player-right .player-hand {
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    flex: 1;
}

.player-left .tile,
.player-right .tile {
    width: 70px;
    flex: 1;
    max-height: 42px;
    font-size: 0.6rem;
}

/* ---- DISCARD POOL ---- */
#discard-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    justify-content: center;
    max-width: 500px;
    padding: 12px;
    background: var(--bg-surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    min-height: 80px;
}

#discard-pool .tile {
    width: 38px;
    height: 50px;
    font-size: 0.85rem;
}

#discard-pool .tile-label {
    font-size: 0.35rem;
}

#discard-pool .tile:last-child {
    border-color: var(--orange);
    box-shadow: 0 0 8px rgba(210, 153, 34, 0.4);
}

#claim-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
}

/* ---- SIDEBAR (hints + history) ---- */
#game-sidebar {
    width: 220px;
    min-width: 220px;
    display: flex;
    flex-direction: column;
    background: var(--bg-card);
    border-left: 1px solid var(--border);
}

#game-log {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    font-size: 0.7rem;
    font-family: 'Courier New', monospace;
    color: var(--text-dim);
    line-height: 1.45;
    min-height: 0;
}
#game-log h3 {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font);
}
#game-log-entries {
    display: flex;
    flex-direction: column-reverse;
}
.log-entry {
    padding: 2px 0;
    border-bottom: 1px solid rgba(48, 54, 61, 0.3);
}
.log-entry:first-child {
    color: var(--text);
    font-weight: 600;
}
.log-draw { color: var(--accent); }
.log-discard { color: var(--orange); }
.log-claim { color: var(--purple); }
.log-mahjong { color: var(--green); font-weight: 700; }

/* ---- HINT PANEL (in sidebar) ---- */
#hint-panel {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    border-bottom: 1px solid var(--border);
    min-height: 0;
}
#hint-panel h3 { color: var(--green); margin-bottom: 6px; font-size: 0.85rem; font-family: var(--font); }
#hint-content { font-size: 0.75rem; color: var(--text-dim); line-height: 1.5; }
#hint-content .hint-hand { color: var(--accent); font-weight: 600; }
#hint-content .hint-action { color: var(--green); font-weight: 600; }
#hint-content .hint-needed { color: var(--orange); font-weight: 600; }

/* Dim tiles that don't contribute to the target hand */
.player-bottom .tile-face.tile-dim {
    opacity: 0.45;
    filter: grayscale(40%);
}
.player-bottom .tile-face.tile-dim:hover {
    opacity: 0.75;
    filter: none;
}

/* ---- MODALS ---- */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
}
.modal-content {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
}
.modal-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.2rem;
    cursor: pointer;
}
.modal-close:hover { color: var(--text); }

.gameover-content {
    text-align: center;
}
#gameover-title { font-size: 2rem; margin-bottom: 12px; }
#gameover-details { color: var(--text-dim); margin-bottom: 8px; }
#gameover-hand { color: var(--accent); font-weight: 600; margin-bottom: 20px; }

/* Scorecard */
#scorecard-body {
    font-size: 0.8rem;
}
.scorecard-cat {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
}
.scorecard-cat h4 {
    color: var(--accent);
    font-size: 0.9rem;
    margin-bottom: 8px;
}
.scorecard-hand {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px;
    border-radius: 4px;
    margin-bottom: 2px;
}
.scorecard-hand:hover { background: var(--bg-surface); }
.sc-pattern { font-family: 'Courier New', monospace; color: var(--text); font-weight: 600; }
.sc-value {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
}
.sc-x { background: rgba(88,166,255,0.15); color: var(--accent); }
.sc-c { background: rgba(219,97,162,0.15); color: var(--pink); }

/* ---- ANIMATIONS ---- */
@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
}

.hidden { display: none !important; }

/* ---- ACTIVE PLAYER INDICATOR ---- */
.player-area.active-player {
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
}

/* ---- RESPONSIVE ---- */
@media (max-width: 900px) {
    #game-board {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto auto;
        height: auto;
        overflow: auto;
    }
    .player-top { grid-column: 1; grid-row: 1; }
    .player-left { grid-column: 1; grid-row: 2; flex-direction: row; }
    .player-right { grid-column: 1; grid-row: 4; flex-direction: row; }
    #center-area { grid-column: 1; grid-row: 3; }
    .player-bottom { grid-column: 1; grid-row: 5; }
    .player-left .player-hand,
    .player-right .player-hand {
        flex-direction: row;
    }
    .player-left .tile,
    .player-right .tile {
        width: 38px;
        height: 50px;
    }
}

    </style>
</head>
<body>
<header id="game-header">
        <div class="header-left">
            <h1>🀄 American Mahjong</h1>
            <span class="subtitle">NMJL 2025</span>
        </div>
        <div class="header-center">
            <span id="wall-count" class="badge">Wall: 152</span>
            <span id="turn-indicator" class="badge turn">East's Turn</span>
        </div>
        <div class="header-right">
            <button id="btn-hint" class="btn btn-hint" title="Toggle Hints">💡 Hints</button>
            <button id="btn-autoplay" class="btn btn-autoplay" title="Toggle Auto-Play">▶ Auto Play</button>
            <button id="btn-scorecard" class="btn btn-scorecard" title="View Scorecard">📋 Card</button>
            <button id="btn-new-game" class="btn btn-primary" title="New Game">🔄 New Game</button>
        </div>
    </header>

    <div id="game-wrapper">
    <main id="game-board">
        <!-- Bot 2 (across) -->
        <section id="player-2" class="player-area player-top">
            <div class="player-label"><span class="player-name">West</span> <span class="tile-count"></span></div>
            <div class="player-exposed"></div>
            <div class="player-hand"></div>
        </section>

        <!-- Bot 1 (left) -->
        <section id="player-1" class="player-area player-left">
            <div class="player-label"><span class="player-name">South</span> <span class="tile-count"></span></div>
            <div class="player-exposed"></div>
            <div class="player-hand"></div>
        </section>

        <!-- Center: discard pool -->
        <section id="center-area">
            <div id="discard-pool"></div>
            <div id="claim-controls" class="hidden">
                <button id="btn-claim-pung" class="btn btn-claim">Pung</button>
                <button id="btn-claim-kong" class="btn btn-claim">Kong</button>
                <button id="btn-claim-quint" class="btn btn-claim">Quint</button>
                <button id="btn-claim-mahjong" class="btn btn-mahjong">Mahjong!</button>
                <button id="btn-pass" class="btn btn-pass">Pass</button>
            </div>

        </section>

        <!-- Bot 3 (right) -->
        <section id="player-3" class="player-area player-right">
            <div class="player-label"><span class="player-name">North</span> <span class="tile-count"></span></div>
            <div class="player-exposed"></div>
            <div class="player-hand"></div>
        </section>

        <!-- Human (bottom) -->
        <section id="player-0" class="player-area player-bottom">
            <div class="player-label"><span class="player-name">You (East)</span> <span class="tile-count"></span></div>
            <div class="player-exposed"></div>
            <div class="player-hand"></div>
        </section>
    </main>
    <aside id="game-sidebar">
        <div id="hint-panel" class="hidden">
            <h3>💡 Hints</h3>
            <div id="hint-content"></div>
        </div>
        <div id="game-log">
            <h3>📜 History</h3>
            <div id="game-log-entries"></div>
        </div>
    </aside>
    </div>

    <!-- Scorecard modal -->
    <div id="scorecard-modal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close" id="scorecard-close">✕</button>
            <h2>📋 NMJL 2025 Scorecard</h2>
            <div id="scorecard-body"></div>
        </div>
    </div>

    <!-- Game over modal -->
    <div id="gameover-modal" class="modal hidden">
        <div class="modal-content gameover-content">
            <h2 id="gameover-title">🎉 Mahjong!</h2>
            <p id="gameover-details"></p>
            <p id="gameover-hand"></p>
            <button class="btn btn-primary" id="gameover-new">Play Again</button>
        </div>
    </div>

    <script>
// tiles.js — Tile definitions & wall builder for American Mahjong (152 tiles)
// Works in both browser (global) and Node.js (module.exports)

const SUIT = { CRAK: 'crak', BAM: 'bam', DOT: 'dot' };
const SUITS = [SUIT.CRAK, SUIT.BAM, SUIT.DOT];
const SUIT_EMOJI = { crak: '🉐', bam: '🎋', dot: '🔘' };
const SUIT_LABEL = { crak: 'CRAK', bam: 'BAM', dot: 'DOT' };
const SUIT_COLOR = { crak: '#e74c3c', bam: '#2ecc71', dot: '#3498db' };

const WINDS = ['N', 'E', 'S', 'W'];
const WIND_NAME = { N: 'North', E: 'East', S: 'South', W: 'West' };

const DRAGONS = ['Red', 'Green', 'White'];
const DRAGON_COLOR = { Red: '#e74c3c', Green: '#2ecc71', White: '#ecf0f1' };
// Matching dragons: Crak↔Red, Bam↔Green, Dot↔White
const SUIT_DRAGON = { crak: 'Red', bam: 'Green', dot: 'White' };
const DRAGON_SUIT = { Red: 'crak', Green: 'bam', White: 'dot' };

const FLOWERS = [
    { name: 'Plum',           emoji: '🌸' },
    { name: 'Orchid',         emoji: '💐' },
    { name: 'Chrysanthemum',  emoji: '🌻' },
    { name: 'Bamboo',         emoji: '🎍' }
];

const SEASONS = [
    { name: 'Spring', emoji: '🌱' },
    { name: 'Summer', emoji: '☀️' },
    { name: 'Autumn', emoji: '🍁' },
    { name: 'Winter', emoji: '❄️' }
];

// ---------------------------------------------------------------------------
// Build the 152-tile wall
// ---------------------------------------------------------------------------
function buildWall() {
    const tiles = [];
    let id = 0;

    // Suited tiles: crak, bam, dot — values 1–9, 4 copies each (108 tiles)
    for (const suit of SUITS) {
        for (let v = 1; v <= 9; v++) {
            for (let c = 0; c < 4; c++) {
                tiles.push({
                    id: id++, type: 'suited', suit, value: v,
                    emoji: v + SUIT_EMOJI[suit],
                    label: SUIT_LABEL[suit],
                    color: SUIT_COLOR[suit]
                });
            }
        }
    }

    // Winds: N, E, S, W — 4 copies each (16 tiles)
    for (const w of WINDS) {
        for (let c = 0; c < 4; c++) {
            tiles.push({
                id: id++, type: 'wind', suit: 'wind', value: w,
                emoji: w, label: 'WIND', color: '#9b59b6'
            });
        }
    }

    // Dragons: Red, Green, White — 4 copies each (12 tiles)
    for (const d of DRAGONS) {
        for (let c = 0; c < 4; c++) {
            tiles.push({
                id: id++, type: 'dragon', suit: 'dragon', value: d,
                emoji: '🐉', label: d.toUpperCase(),
                color: DRAGON_COLOR[d]
            });
        }
    }

    // Flowers — 4 unique, 1 each
    for (const f of FLOWERS) {
        tiles.push({

        const deduped = [];

            if (!seen.has(k)) { seen.add(k); deduped.push(r); }

     * Avoids re-scanning tiles array each call.

    function computeDistanceFast(hand, inv, jokers) {

        if (suitMin === 0 && suitMax === 0) {

            if (d < best) best = d;

            for (let i = 0; i < invKeys.length; i++) inv[invKeys[i]] = savedVals[i];
        }

    }

        const inv = {};
        let jokers = 0;
        for (const t of tiles) {
            if (t.type === 'joker') { jokers++; continue; }
            const k = T.tileKey(t);

        return computeDistanceFast(hand, inv, jokers);

        let jokersLeft = jokers;
        let needed = 0;
        let suitVarIdx = 0;

        for (const g of groups) {
            const ch = g.ch;
            let keys;
            const canJoker = g.count >= 3;

            if (ch === 'F') {
                keys = ['flower-Plum','flower-Orchid','flower-Chrysanthemum','flower-Bamboo',

            } else if (ch === 'D') {
                keys = ['dragon-Red','dragon-Green','dragon-White'];
            } else if (ch === 'N') { keys = ['wind-N']; }
            else if (ch === 'E') { keys = ['wind-E']; }
            else if (ch === 'W') { keys = ['wind-W']; }
            else if (ch === 'S') { keys = ['wind-S']; }
            else if (ch === '0') { keys = ['dragon-White']; }
            else if (ch >= '1' && ch <= '9') {

            if (needed >= bestSoFar) return needed;

        module.exports = HandsModule;
    } else {
        window.Hands = HandsModule;

    const T = (typeof module !== 'undefined' && module.exports) ? require('./tiles') : window.Tiles;
    const H = (typeof module !== 'undefined' && module.exports) ? require('./hands') : window.Hands;

    // Game phases
    const PHASE = {
        DEALING: 'dealing',
        TURN_DRAW: 'turn_draw',      // current player draws from wall
        TURN_DISCARD: 'turn_discard', // current player picks a tile to discard
        CLAIM_WINDOW: 'claim_window', // other players may claim the discard
        GAME_OVER: 'game_over'
    };

    function createGame(options = {}) {
        const numPlayers = options.numPlayers || 4;
        const wall = T.shuffle(T.buildWall());
        const headless = options.humanIndex === -1 || options.headless === true;

        const players = [];
        for (let i = 0; i < numPlayers; i++) {
            players.push({
                index: i,
                name: options.names ? options.names[i] : `Player ${i}`,
                isHuman: options.humanIndex === i,
                hand: [],       // concealed tiles
                exposed: [],    // array of exposed groups: [{ tiles: [], claimedTile }]
                discards: [],   // tiles this player has discarded
                score: 0,
                targetHands: null, // bot's target hands (set by bot AI)
                _allTilesCache: null // cached getAllTiles result
            });
        }

        const game = {
            wall,
            players,
            headless,
            currentPlayer: 0,  // East is dealer (index 0)
            phase: PHASE.DEALING,
            discardPool: [],    // all discards in order
            lastDiscard: null,  // most recent discard (tile object)
            lastDiscardFrom: -1,
            turnCount: 0,
            winner: null,
            winningHand: null,
            log: [],
            callbacks: {
                onPhaseChange: null,
                onTileDraw: null,
                onDiscard: null,
                onClaim: null,
                onWin: null,
                onWallEmpty: null,
                onLog: null
            }
        };

    }

    /** Invalidate a player's cached tile data */
    function invalidateCache(player) {
        player._allTilesCache = null;
    }

    function addLog(game, msg) {
        game.log.push(msg);
        if (game.log.length > 500) game.log.shift();
        if (game.callbacks.onLog) game.callbacks.onLog(msg);
    }

    // -----------------------------------------------------------------------
    // DEALING
    // -----------------------------------------------------------------------
    function dealTiles(game) {
        game.phase = PHASE.DEALING;
        // East (player 0) gets 14 tiles, others get 13
        for (let round = 0; round < 13; round++) {
            for (let p = 0; p < game.players.length; p++) {
                if (game.wall.length > 0) {
                    game.players[p].hand.push(game.wall.pop());
                }
            }
        }
        // East gets one extra
        if (game.wall.length > 0) {
            game.players[0].hand.push(game.wall.pop());
        }

        if (!game.headless) {
            for (const p of game.players) {

        }
        for (const p of game.players) invalidateCache(p);

        game.currentPlayer = 0;

        game.phase = PHASE.TURN_DISCARD;
        if (game.callbacks.onPhaseChange) game.callbacks.onPhaseChange(game);

    // -----------------------------------------------------------------------
    // DRAW
    // -----------------------------------------------------------------------
    function drawTile(game) {

        if (game.wall.length === 0) {

            addLog(game, 'Wall is empty — wall game (no winner).');
            if (game.callbacks.onWallEmpty) game.callbacks.onWallEmpty(game);
            if (game.callbacks.onPhaseChange) game.callbacks.onPhaseChange(game);
            return null;
        }
        const tile = game.wall.pop();
        const player = game.players[game.currentPlayer];
        player.hand.push(tile);
        if (!game.headless) player.hand = T.sortTiles(player.hand);
        invalidateCache(player);
        game.phase = PHASE.TURN_DISCARD;
        addLog(game, `${player.name} draws ${T.tileStr(tile)}. (Wall: ${game.wall.length})`);
        if (game.callbacks.onTileDraw) game.callbacks.onTileDraw(game, tile);
        if (game.callbacks.onPhaseChange) game.callbacks.onPhaseChange(game);
        return tile;

    function discardTile(game, tileIndex) {
        if (game.phase !== PHASE.TURN_DISCARD) return null;
        const player = game.players[game.currentPlayer];
        if (tileIndex < 0 || tileIndex >= player.hand.length) return null;

        // Cannot discard a joker — check BEFORE splicing
        if (player.hand[tileIndex].type === 'joker') return null;

        const tile = player.hand.splice(tileIndex, 1)[0];
        invalidateCache(player);
        player.discards.push(tile);
        game.discardPool.push(tile);
        game.lastDiscard = tile;
        game.lastDiscardFrom = game.currentPlayer;
        game._pendingBotClaims = null;
        game.phase = PHASE.CLAIM_WINDOW;

        addLog(game, `${player.name} discards ${T.tileStr(tile)}.`);
        if (game.callbacks.onDiscard) game.callbacks.onDiscard(game, tile);
        if (game.callbacks.onPhaseChange) game.callbacks.onPhaseChange(game);

    // -----------------------------------------------------------------------

    /**
     * Get all tiles the player has of the same key as the tile.

    function getMatchingTiles(player, tile) {

        return player.hand.filter(t => T.tileKey(t) === key);

     * Check if a player can claim the discard for exposure (pung/kong/quint).

    function getClaimOptions(game, playerIndex) {
        if (!game.lastDiscard) return [];
        if (playerIndex === game.lastDiscardFrom) return [];

        const player = game.players[playerIndex];
        const tile = game.lastDiscard;
        const key = T.tileKey(tile);
        const matching = player.hand.filter(t => T.tileKey(t) === key);
        const jokers = player.hand.filter(t => t.type === 'joker');
        const options = [];

        const totalNatural = matching.length;
        const totalJokers = jokers.length;

        if (totalNatural + totalJokers >= 2) {
            const pungTiles = [];
            let needed = 2;
            for (const m of matching) { if (needed > 0) { pungTiles.push(m); needed--; } }
            for (const j of jokers) { if (needed > 0) { pungTiles.push(j); needed--; } }
            options.push({ type: 'pung', tiles: pungTiles, count: 3 });
        }

        // For kong: need 3 more
        if (totalNatural + totalJokers >= 3) {
            const kongTiles = [];
            let needed = 3;
            for (const m of matching) { if (needed > 0) { kongTiles.push(m); needed--; } }
            for (const j of jokers) { if (needed > 0) { kongTiles.push(j); needed--; } }
            options.push({ type: 'kong', tiles: kongTiles, count: 4 });
        }

        if (totalNatural + totalJokers >= 4) {
            const quintTiles = [];
            let needed = 4;
            for (const m of matching) { if (needed > 0) { quintTiles.push(m); needed--; } }
            for (const j of jokers) { if (needed > 0) { quintTiles.push(j); needed--; } }

    function canCallMahjong(game, playerIndex) {

        const player = game.players[playerIndex];

        const testHand = getAllTiles(player).concat([game.lastDiscard]);

    /**
     * Check if current player has Mahjong after drawing (self-draw / tsumo).

    function checkSelfMahjong(game) {

     */
    function getAllTiles(player) {
        if (player._allTilesCache) return player._allTilesCache;

        game.discardPool.pop();

        // Remove exposed tiles from player's hand
        for (const et of exposeTiles) {
            const idx = player.hand.findIndex(t => t.id === et.id);
            if (idx >= 0) player.hand.splice(idx, 1);

        const group = { tiles: [tile, ...exposeTiles], claimType };
        player.exposed.push(group);
        if (!game.headless) player.hand = T.sortTiles(player.hand);

        game.lastDiscard = null;
        game.lastDiscardFrom = -1;
        game.phase = PHASE.TURN_DISCARD;

        if (game.callbacks.onPhaseChange) game.callbacks.onPhaseChange(game);
    }

    /**
     * Execute a Mahjong claim.
     */
    function executeMahjong(game, playerIndex) {
        const player = game.players[playerIndex];
        const tile = game.lastDiscard;

        if (tile) {
            game.discardPool.pop();
            player.hand.push(tile);
            if (!game.headless) player.hand = T.sortTiles(player.hand);
            invalidateCache(player);
        }

        const allTiles = getAllTiles(player);
        const winHand = H.checkMahjong(allTiles);

        game.winner = playerIndex;
        game.winningHand = winHand;
        game.phase = PHASE.GAME_OVER;

        addLog(game, `🎉 ${player.name} declares MAHJONG! ${winHand ? winHand.cat + ' — ' + winHand.display + ' (' + winHand.value + ' pts)' : ''}`);
        if (game.callbacks.onWin) game.callbacks.onWin(game, playerIndex, winHand);
        if (game.callbacks.onPhaseChange) game.callbacks.onPhaseChange(game);
    }

    /**
     * No one claims — advance to next player's turn.
     */
    function passClaim(game) {
        if (game.phase === PHASE.GAME_OVER) return;
        game.lastDiscard = null;
        game.lastDiscardFrom = -1;
        game._pendingBotClaims = null;
        game.currentPlayer = (game.currentPlayer + 1) % game.players.length;
        game.turnCount++;
        game.phase = PHASE.TURN_DRAW;
        if (game.callbacks.onPhaseChange) game.callbacks.onPhaseChange(game);
    }

    /**
     * Resolve claims from multiple players. Priority: Mahjong > larger group > seat order.
     * Returns the winning claim or null (no claims).
     */
    function resolveClaims(game, claims) {
        if (!claims || claims.length === 0) return null;

        // Mahjong claims have absolute priority
        const mjClaims = claims.filter(c => c.type === 'mahjong');
        if (mjClaims.length > 0) {
            // Closest seat to discarder wins
            return pickClosestSeat(game, mjClaims);
        }

        // Among exposure claims, larger group wins
        const sorted = [...claims].sort((a, b) => (b.count || 3) - (a.count || 3));
        const best = sorted[0];
        const ties = sorted.filter(c => (c.count || 3) === (best.count || 3));
        return pickClosestSeat(game, ties);
    }

    function pickClosestSeat(game, claims) {
        const from = game.lastDiscardFrom;
        let best = null;
        let bestDist = 99;
        for (const c of claims) {
            const dist = (c.playerIndex - from + game.players.length) % game.players.length;
            if (dist > 0 && dist < bestDist) {
                best = c;
                bestDist = dist;
            }
        }
        return best;
    }

    // -----------------------------------------------------------------------
    // Joker exchange: swap a natural tile for an exposed joker
    // -----------------------------------------------------------------------
    function canExchangeJoker(game, playerIndex, tileInHand, targetPlayer, groupIndex) {
        const group = game.players[targetPlayer].exposed[groupIndex];
        if (!group || group.tiles.length < 3) return false;
        // Find a joker in the group
        const hasJoker = group.tiles.some(t => t.type === 'joker');
        if (!hasJoker) return false;
        // The tile must match what the joker is substituting
        const nonJokers = group.tiles.filter(t => t.type !== 'joker');
        if (nonJokers.length === 0) {

            return true;
        }
        const groupKey = T.tileKey(nonJokers[0]);
        return T.tileKey(tileInHand) === groupKey;
    }

    function executeJokerExchange(game, playerIndex, tileInHand, targetPlayer, groupIndex) {
        const player = game.players[playerIndex];
        const group = game.players[targetPlayer].exposed[groupIndex];
        // Remove tile from hand
        const idx = player.hand.findIndex(t => t.id === tileInHand.id);
        if (idx < 0) return false;
        player.hand.splice(idx, 1);
        // Swap: add tile to group, remove a joker from group
        const jkIdx = group.tiles.findIndex(t => t.type === 'joker');
        const joker = group.tiles.splice(jkIdx, 1)[0];
        group.tiles.push(tileInHand);
        // Give joker to player
        player.hand.push(joker);
        if (!game.headless) player.hand = T.sortTiles(player.hand);
        invalidateCache(player);
        invalidateCache(game.players[targetPlayer]);
        addLog(game, `${player.name} exchanges ${T.tileStr(tileInHand)} for a Joker from ${game.players[targetPlayer].name}'s exposed group.`);
        return true;
    }

    // -----------------------------------------------------------------------
    // Export
    // -----------------------------------------------------------------------
    const GameModule = {
        PHASE,
        createGame, dealTiles, drawTile, discardTile,
        getClaimOptions, canCallMahjong, checkSelfMahjong,

    <script>
// bot.js — Bot AI for American Mahjong
// Works in both browser and Node.js

(function () {
    const T = (typeof module !== 'undefined' && module.exports) ? require('./tiles') : window.Tiles;
    const H = (typeof module !== 'undefined' && module.exports) ? require('./hands') : window.Hands;

    /**
     * Initialize bot strategy: pick top target hands.
     */
    function initBot(game, playerIndex) {
        const player = game.players[playerIndex];
        const allTiles = G.getAllTiles(player);
        player.targetHands = H.evaluateHand(allTiles).slice(0, 5);
    }

    /**
     * Build a danger map: how "dangerous" each tile key is to discard.
     * Higher score = more likely to feed an opponent.
     */
    function buildDangerMap(game, playerIndex) {
        const danger = {};

        // Scan opponents' exposed groups — tiles they're actively collecting
        for (let i = 0; i < game.players.length; i++) {
            if (i === playerIndex) continue;
            const opp = game.players[i];
            for (const grp of opp.exposed) {
                for (const t of grp.tiles) {
                    if (t.type === 'joker') continue;
                    const k = T.tileKey(t);
                    // The tile key they've exposed is dangerous — they want more
                    danger[k] = (danger[k] || 0) + 2;
                }
            }
        }

        // Tiles that have been discarded are safer — some copies are dead
        const discardFreq = {};
        for (const t of game.discardPool) {
            const k = T.tileKey(t);
            discardFreq[k] = (discardFreq[k] || 0) + 1;
        }
        for (const k of Object.keys(discardFreq)) {
            // Each discarded copy makes it a bit safer
            danger[k] = (danger[k] || 0) - discardFreq[k] * 0.5;
        }

        return danger;
    }

    /**
     * Try to exchange natural tiles for jokers in any exposed group.
     * Returns the number of exchanges made.
     */
    function tryJokerExchanges(game, playerIndex) {
        let exchanges = 0;
        let changed = true;

        while (changed) {
            changed = false;
            const player = game.players[playerIndex];

            for (let pi = 0; pi < game.players.length; pi++) {
                const target = game.players[pi];
                for (let gi = 0; gi < target.exposed.length; gi++) {
                    const grp = target.exposed[gi];
                    if (!grp.tiles.some(t => t.type === 'joker')) continue;

                    // Find a matching natural tile in hand
                    for (let hi = 0; hi < player.hand.length; hi++) {
                        const tile = player.hand[hi];
                        if (tile.type === 'joker') continue;
                        if (G.canExchangeJoker(game, playerIndex, tile, pi, gi)) {
                            G.executeJokerExchange(game, playerIndex, tile, pi, gi);
                            exchanges++;
                            changed = true;
                            break; // hand indices shifted, restart inner loop
                        }
                    }
                    if (changed) break; // restart group loop too
                }
                if (changed) break; // restart player loop
            }
        }

        return exchanges;
    }

    /**
     * Pick the best tile to discard.
     * Strategy: remove the tile that contributes least to the closest target hand,
     * with a penalty for tiles that are dangerous to discard (defensive play).
     */
    function pickDiscard(game, playerIndex) {
        if (game.phase === G.PHASE.GAME_OVER) return -1;
        const player = game.players[playerIndex];
        const hand = player.hand;
        if (hand.length === 0) return -1;

        const allTiles = G.getAllTiles(player);

        const targets = H.evaluateHand(allTiles);
        player.targetHands = targets.slice(0, 5);

        const danger = buildDangerMap(game, playerIndex);

        // Only re-evaluate unique tile keys (not all tiles individually)
        const seen = new Map();
        for (let i = 0; i < hand.length; i++) {
            const tile = hand[i];
            if (tile.type === 'joker') continue;
            const key = T.tileKey(tile);

        let bestScore = -Infinity;

        const inv = {};
        let jokers = 0;
        for (const t of allTiles) {
            if (t.type === 'joker') { jokers++; continue; }
            const k = T.tileKey(t);
            inv[k] = (inv[k] || 0) + 1;

        for (const [key, i] of seen) {

            let bestDist = 99;
            for (const h of hands) {

                const invKeys = Object.keys(inv);
                const saved = new Array(invKeys.length);

                const dist = computeDistFast(h, inv, jokers, bestDist);

                // Restore
                for (let si = 0; si < invKeys.length; si++) inv[invKeys[si]] = saved[si];

            let score = -bestDist;

            const dangerScore = danger[key] || 0;

        // Edge case: all jokers — shouldn't happen but be safe
        if (bestIdx < 0 && hand.length > 0) bestIdx = 0;
        return bestIdx;
    }

    /**
     * Inline distance computation for bot — avoids rebuilding tile arrays.
     */
    function computeDistFast(hand, inv, jokers, bestSoFar) {
        const { suitMin, suitMax } = hand;
        const perms = getSuitPermsLocal(suitMin, suitMax);

        const invKeys = Object.keys(inv);
        const saved = new Array(invKeys.length);
        let best = bestSoFar;

        for (const p of perms) {
            for (let i = 0; i < invKeys.length; i++) saved[i] = inv[invKeys[i]];
            const d = distWithSuitsLocal(hand.groups, inv, jokers, p, best);

    const _suitPermCacheBot = {};
    function getSuitPermsLocal(minSuits, maxSuits) {
        const ck = `${minSuits},${maxSuits}`;
        if (_suitPermCacheBot[ck]) return _suitPermCacheBot[ck];
        const suits = ['crak', 'bam', 'dot'];
        const results = [];
        for (const a of suits) for (const b of suits) for (const c of suits) {

            if (used.size >= minSuits && used.size <= maxSuits) results.push([a, b, c]);

        const seen = new Set();
        const filtered = results.filter(p => { const k = p.join(','); if (seen.has(k)) return false; seen.add(k); return true; });
        _suitPermCacheBot[ck] = filtered;

    function distWithSuitsLocal(groups, inv, jokers, suitPerm, bestSoFar) {
        let jokersLeft = jokers, needed = 0, suitVarIdx = 0;
        for (const g of groups) {
            const ch = g.ch;
            let keys;
            const canJoker = g.count >= 3;
            if (ch === 'F') keys = ['flower-Plum','flower-Orchid','flower-Chrysanthemum','flower-Bamboo','season-Spring','season-Summer','season-Autumn','season-Winter'];

            else if (ch === 'N') keys = ['wind-N'];
            else if (ch === 'E') keys = ['wind-E'];
            else if (ch === 'W') keys = ['wind-W'];

            for (const k of keys) { const use = Math.min(inv[k] || 0, g.count - have); have += use; inv[k] = (inv[k] || 0) - use; }

     */
    function decideClaim(game, playerIndex) {
        if (game.phase === G.PHASE.GAME_OVER || !game.lastDiscard) return null;
        const player = game.players[playerIndex];

        // Check for Mahjong first

        const targets = player.targetHands && player.targetHands.length > 0
            ? player.targetHands.slice(0, 3)

        const bestTarget = targets[0];

        const options = G.getClaimOptions(game, playerIndex);
        if (options.length === 0) return null;

        // Compute evalBefore once (not per-option)
        const distBefore = bestTarget ? bestTarget.distance : 99;

        // Pick the largest valid group that helps our hand
        const sortedOptions = options.slice().sort((a, b) => b.count - a.count);
        for (const opt of sortedOptions) {

// hints.js — Hint engine for American Mahjong
// Works in both browser and Node.js

(function () {
    const T = (typeof module !== 'undefined' && module.exports) ? require('./tiles') : window.Tiles;
    const H = (typeof module !== 'undefined' && module.exports) ? require('./hands') : window.Hands;
    const G = (typeof module !== 'undefined' && module.exports) ? require('./game') : window.Game;

    /**
     * Get the best discard suggestion for the human player.
     * Returns { tileIndex, reason, targetHand, distance, keepIndices, neededTiles }
     */
    function getBestDiscard(game, playerIndex) {
        const player = game.players[playerIndex];
        const hand = player.hand;
        if (hand.length === 0) return null;

        // Evaluate baseline (full hand including exposed)
        const allTiles = [...hand];
        for (const grp of player.exposed) allTiles.push(...grp.tiles);
        const baseEval = H.evaluateHand(allTiles);

        let bestIdx = -1;
        let bestDist = 99;
        let bestTarget = null;
        let results = []; // track all candidates

        for (let i = 0; i < hand.length; i++) {
            if (hand[i].type === 'joker') continue;

            const remaining = [...hand.slice(0, i), ...hand.slice(i + 1)];
            const testAll = [...remaining];
            for (const grp of player.exposed) testAll.push(...grp.tiles);

            const eval_ = H.evaluateHand(testAll);
            if (eval_.length > 0) {
                const dist = eval_[0].distance;
                results.push({ idx: i, dist, target: eval_[0] });
                if (dist < bestDist) {
                    bestDist = dist;
                }
            }
        }

        // Among tiles tied for best distance, use multi-factor scoring
        const tied = results.filter(r => r.dist === bestDist);
        if (tied.length > 0) {
            // Count how many times each tile key appears in hand
            const freq = {};
            for (const t of hand) {
                const k = T.tileKey(t);
                freq[k] = (freq[k] || 0) + 1;
            }

            // Evaluate top N target hands to compute contribution score
            const topTargets = baseEval.slice(0, 5);

            // For each tied candidate, score how un-useful it is (higher = better to discard)
            for (const cand of tied) {
                const tile = hand[cand.idx];
                const tileKey = T.tileKey(tile);

                // Factor 1: frequency (singletons preferred to discard)
                cand.freq = freq[tileKey] || 0;

                // Factor 2: how many top hands does this tile NOT contribute to?
                // A tile in 0 of 5 top hands is very safe to discard
                let contributionCount = 0;
                for (const target of topTargets) {
                    const keep = computeKeepIndices(hand, player.exposed, target, -1);
                    if (keep.includes(cand.idx)) contributionCount++;
                }
                cand.nonContribution = topTargets.length - contributionCount;
            }

            // Sort: highest nonContribution first, then lowest frequency, then random
            tied.sort((a, b) => {
                // Prefer tiles that contribute to fewer top hands
                if (a.nonContribution !== b.nonContribution) return b.nonContribution - a.nonContribution;
                // Then prefer singletons
                if (a.freq !== b.freq) return a.freq - b.freq;
                // Random tiebreak to avoid always picking leftmost
                return Math.random() - 0.5;
            });
            bestIdx = tied[0].idx;
            bestTarget = tied[0].target;
        }

        if (bestIdx < 0) {
            for (let i = 0; i < hand.length; i++) {
                if (hand[i].type !== 'joker') { bestIdx = i; break; }
            }
        }

        // ── Compute real keepIndices ──
        // Match tiles in-hand against the target hand's pattern groups
        const keepIndices = computeKeepIndices(hand, player.exposed, bestTarget, bestIdx);

        // ── Compute neededTiles ──
        // Figure out what specific tiles the player still needs
        const neededTiles = bestTarget ? computeNeededTiles(hand, player.exposed, bestTarget) : [];

        return {
            tileIndex: bestIdx,
            tile: hand[bestIdx],
            reason: bestTarget
                ? `Discard ${T.tileStr(hand[bestIdx])} to stay closest to "${bestTarget.display}" (${bestTarget.cat}, ${bestTarget.distance} tiles away)`
                : 'No strong target — discard least useful tile.',
            targetHand: bestTarget,
            distance: bestDist,
            keepIndices,
            neededTiles
        };
    }

    /**
     * Compute which tiles in the player's hand contribute to the target hand.
     * Returns an array of hand indices that are "useful".
     */
    function computeKeepIndices(hand, exposed, target, discardIdx) {
        if (!target) {
            // No target — keep everything except the discard
            const indices = [];
            for (let i = 0; i < hand.length; i++) {
                if (i !== discardIdx) indices.push(i);
            }
            return indices;
        }

        // Get the compiled hands and find the matching one
        const compiled = H.compileHands();
        const matchingHand = compiled.find(h =>
            h.cat === target.cat && h.display === target.display
        );
        if (!matchingHand) {
            const indices = [];
            for (let i = 0; i < hand.length; i++) {
                if (i !== discardIdx) indices.push(i);
            }
            return indices;
        }

        // Build inventory of tiles (hand only, minus the discard)
        const handTiles = hand.filter((_, i) => i !== discardIdx);
        const handKeys = handTiles.map(t => t.type === 'joker' ? 'joker' : T.tileKey(t));

        // Build exposed tile keys
        const exposedKeys = [];
        for (const grp of exposed) {
            for (const t of grp.tiles) {
                exposedKeys.push(t.type === 'joker' ? 'joker' : T.tileKey(t));
            }
        }

        // We need to try suit permutations to find the best assignment
        const groups = matchingHand.groups;
        const { suitMin, suitMax } = matchingHand;

        let bestKeep = null;
        let bestKeepCount = -1;

        const perms = (suitMin === 0 && suitMax === 0)
            ? [['crak', 'bam', 'dot']]
            : getSuitPermsForKeep(suitMin, suitMax);

        for (const perm of perms) {
            const result = matchKeepTiles(groups, handKeys, exposedKeys, perm, hand, discardIdx);
            if (result && result.length > bestKeepCount) {
                bestKeep = result;
                bestKeepCount = result.length;
            }
        }

        return bestKeep || [];
    }

    function getSuitPermsForKeep(minSuits, maxSuits) {
        const suits = ['crak', 'bam', 'dot'];
        const results = [];
        const seen = new Set();
        for (const a of suits) {
            for (const b of suits) {
                for (const c of suits) {
                    const used = new Set([a, b, c]);
                    if (used.size >= minSuits && used.size <= maxSuits) {
                        const k = [a, b, c].join(',');
                        if (!seen.has(k)) { seen.add(k); results.push([a, b, c]); }
                    }
                }
            }
        }
        return results;
    }

    /**
     * For a given suit permutation, figure out which hand indices contribute.
     */
    function matchKeepTiles(groups, handKeys, exposedKeys, suitPerm, hand, discardIdx) {
        const usedHandIdx = new Set();
        const availableHand = handKeys.map((k, i) => ({ key: k, origIdx: i }));
        // Map origIdx back to real hand index (skipping discardIdx)
        const realIdx = [];
        let j = 0;
        for (let i = 0; i < hand.length; i++) {
            if (i === discardIdx) continue;
            realIdx.push(i);
            j++;
        }

        const availableExposed = [...exposedKeys];
        let suitVarIdx = 0;

        for (const g of groups) {
            const ch = g.ch;
            let targetKeys = [];

            if (ch === 'F') {
                targetKeys = ['flower-Plum', 'flower-Orchid', 'flower-Chrysanthemum', 'flower-Bamboo',
                    'season-Spring', 'season-Summer', 'season-Autumn', 'season-Winter'];
            } else if (ch === 'D') {
                targetKeys = ['dragon-Red', 'dragon-Green', 'dragon-White'];
            } else if (ch === 'N') { targetKeys = ['wind-N']; }
            else if (ch === 'E') { targetKeys = ['wind-E']; }
            else if (ch === 'W') { targetKeys = ['wind-W']; }
            else if (ch === 'S') { targetKeys = ['wind-S']; }
            else if (ch === '0') { targetKeys = ['dragon-White']; }
            else if (ch >= '1' && ch <= '9') {
                const val = g.value || parseInt(ch);
                const suit = suitPerm[suitVarIdx % 3];
                suitVarIdx++;
                targetKeys = [`${suit}-${val}`];
            } else continue;

            // Try to fill from exposed first, then hand
            let remaining = g.count;

            // Count exposed matches
            for (let ei = 0; ei < availableExposed.length && remaining > 0; ei++) {
                if (targetKeys.includes(availableExposed[ei])) {
                    remaining--;
                    availableExposed[ei] = '__used__';
                }
            }

            // Fill from hand
            for (let hi = 0; hi < availableHand.length && remaining > 0; hi++) {
                if (availableHand[hi].key === '__used__') continue;
                if (targetKeys.includes(availableHand[hi].key)) {
                    usedHandIdx.add(realIdx[hi]);
                    availableHand[hi].key = '__used__';
                    remaining--;
                }
            }

            // Jokers can fill remaining (from hand)
            const canJoker = g.count >= 3;
            if (canJoker && remaining > 0) {
                for (let hi = 0; hi < availableHand.length && remaining > 0; hi++) {
                    if (availableHand[hi].key === 'joker') {
                        usedHandIdx.add(realIdx[hi]);
                        availableHand[hi].key = '__used__';
                        remaining--;
                    }
                }
            }
        }

        return Array.from(usedHandIdx);
    }

    /**
     * Compute which specific tiles the player still needs for the target hand.
     * Returns [{ key, name, count }]
     */
    function computeNeededTiles(hand, exposed, target) {
        const compiled = H.compileHands();
        const matchingHand = compiled.find(h =>
            h.cat === target.cat && h.display === target.display
        );
        if (!matchingHand) return [];

        // Build full tile inventory
        const inv = {};
        let jokers = 0;
        const allTiles = [...hand];
        for (const grp of exposed) allTiles.push(...grp.tiles);
        for (const t of allTiles) {
            if (t.type === 'joker') { jokers++; continue; }
            const k = T.tileKey(t);
            inv[k] = (inv[k] || 0) + 1;
        }

        const groups = matchingHand.groups;
        const { suitMin, suitMax } = matchingHand;

        const perms = (suitMin === 0 && suitMax === 0)
            ? [['crak', 'bam', 'dot']]
            : getSuitPermsForKeep(suitMin, suitMax);

        let bestNeeded = null;
        let bestNeededCount = Infinity;

        for (const perm of perms) {
            const needed = computeNeededForPerm(groups, inv, jokers, perm);
            const total = needed.reduce((s, n) => s + n.count, 0);
            if (total < bestNeededCount) {
                bestNeededCount = total;
                bestNeeded = needed;
            }
        }

        return bestNeeded || [];
    }

    function computeNeededForPerm(groups, inv, jokers, suitPerm) {
        const invCopy = { ...inv };
        let jokersLeft = jokers;
        let suitVarIdx = 0;
        const needed = [];

        for (const g of groups) {
            const ch = g.ch;
            let keys = [];
            let displayName = '';

            if (ch === 'F') {
                keys = ['flower-Plum', 'flower-Orchid', 'flower-Chrysanthemum', 'flower-Bamboo',
                    'season-Spring', 'season-Summer', 'season-Autumn', 'season-Winter'];
                displayName = 'Flower/Season';
            } else if (ch === 'D') {
                keys = ['dragon-Red', 'dragon-Green', 'dragon-White'];
                displayName = 'Dragon';
            } else if (ch === 'N') { keys = ['wind-N']; displayName = 'North'; }
            else if (ch === 'E') { keys = ['wind-E']; displayName = 'East'; }
            else if (ch === 'W') { keys = ['wind-W']; displayName = 'West'; }
            else if (ch === 'S') { keys = ['wind-S']; displayName = 'South'; }
            else if (ch === '0') { keys = ['dragon-White']; displayName = 'Soap (0)'; }
            else if (ch >= '1' && ch <= '9') {
                const val = g.value || parseInt(ch);
                const suit = suitPerm[suitVarIdx % 3];
                suitVarIdx++;
                keys = [`${suit}-${val}`];
                const suitName = suit.charAt(0).toUpperCase() + suit.slice(1);
                displayName = `${suitName} ${val}`;
            } else continue;

            const canJoker = g.count >= 3;
            let have = 0;
            for (const k of keys) {
                const use = Math.min(invCopy[k] || 0, g.count - have);
                have += use;
                invCopy[k] = (invCopy[k] || 0) - use;
            }
            let deficit = g.count - have;
            if (deficit > 0 && canJoker) {
                const jUse = Math.min(deficit, jokersLeft);
                jokersLeft -= jUse;
                deficit -= jUse;
            }
            if (deficit > 0) {
                needed.push({ key: keys[0], name: displayName, count: deficit });
            }
        }

        return needed;
    }

    /**
     * Get claim advice: should the player claim the current discard?
     * Now includes before/after distance comparison.
     */
    function getClaimAdvice(game, playerIndex) {
        const player = game.players[playerIndex];
        const allTiles = G.getAllTiles(player);
        const options = G.getClaimOptions(game, playerIndex);

        if (G.canCallMahjong(game, playerIndex)) {
            return { shouldClaim: true, type: 'mahjong', reason: '🎉 You can declare MAHJONG!' };
        }

        if (options.length === 0) return { shouldClaim: false, reason: 'No valid claim available.' };

        // Check if claiming improves position
        const evalBefore = H.evaluateHand(allTiles);
        const distBefore = evalBefore.length > 0 ? evalBefore[0].distance : 99;
        const targetBefore = evalBefore[0];

        // If pursuing concealed hand, warn
        if (targetBefore && targetBefore.concealed) {
            return {
                shouldClaim: false,
                reason: `You're closest to a CONCEALED hand (${targetBefore.display}). Claiming would prevent completing it.`
            };
        }

        // Simulate each claim option and find the best one
        const sortedOptions = options.slice().sort((a, b) => b.count - a.count);
        let bestOption = null;
        let bestDistAfter = 99;

        for (const opt of sortedOptions) {
            // Simulate claiming: remove exposed tiles from hand, add discard + exposed as a group
            const testHand = player.hand.slice();
            for (const et of opt.tiles) {
                const idx = testHand.findIndex(t => t.id === et.id);
                if (idx >= 0) testHand.splice(idx, 1);
            }
            const testAll = testHand.concat([game.lastDiscard], opt.tiles);
            for (const grp of player.exposed) {
                for (const t of grp.tiles) testAll.push(t);
            }

            const evalAfter = H.evaluateHand(testAll);
            const distAfter = evalAfter.length > 0 ? evalAfter[0].distance : 99;

            if (distAfter < bestDistAfter) {
                bestDistAfter = distAfter;
                bestOption = opt;
            }
        }

        if (!bestOption) {
            return { shouldClaim: false, reason: 'No claim improves your position.' };
        }

        const improved = bestDistAfter < distBefore;
        const same = bestDistAfter === distBefore;

        if (improved) {
            return {
                shouldClaim: true,
                type: bestOption.type,
                tiles: bestOption.tiles,
                reason: `Claim for ${bestOption.type}! Reduces distance from ${distBefore} → ${bestDistAfter} toward ${targetBefore ? targetBefore.display : 'a hand'}.`
            };
        } else if (same) {
            return {
                shouldClaim: false,
                type: bestOption.type,
                reason: `Claiming for ${bestOption.type} won't improve distance (stays at ${distBefore}). Consider passing.`
            };
        } else {
            return {
                shouldClaim: false,
                reason: `Claiming would hurt — distance goes from ${distBefore} → ${bestDistAfter}. Pass.`
            };
        }
    }

    /**
     * Get a full hint summary for the player.
     */
    function getHintSummary(game, playerIndex) {
        const player = game.players[playerIndex];
        const allTiles = G.getAllTiles(player);
        const targets = H.evaluateHand(allTiles).slice(0, 5);

        return {
            closestHands: targets.map(t => ({
                name: `${t.cat}: ${t.display}`,
                distance: t.distance,
                value: t.value,
                concealed: t.concealed
            })),
            discard: game.phase === G.PHASE.TURN_DISCARD ? getBestDiscard(game, playerIndex) : null,
            claim: game.phase === G.PHASE.CLAIM_WINDOW ? getClaimAdvice(game, playerIndex) : null
        };
    }

    // -----------------------------------------------------------------------
    // Export
    // -----------------------------------------------------------------------
    const HintsModule = { getBestDiscard, getClaimAdvice, getHintSummary };

    if (typeof module !== 'undefined' && module.exports) {
        module.exports = HintsModule;
    } else {
        window.Hints = HintsModule;
    }
})();

// ui.js — DOM rendering, event handlers, game orchestration
// Browser-only — references window.Tiles, window.Hands, etc.

(function () {

    const H = window.Hands;
    const G = window.Game;

    // INIT
    // -----------------------------------------------------------------------
    document.addEventListener('DOMContentLoaded', () => {

        document.getElementById('btn-autoplay').addEventListener('click', toggleAutoPlay);
        document.getElementById('btn-scorecard').addEventListener('click', showScorecard);
        document.getElementById('scorecard-close').addEventListener('click', hideScorecard);
        document.getElementById('gameover-new').addEventListener('click', startGame);

        document.getElementById('btn-claim-kong').addEventListener('click', () => humanClaim('kong'));
        document.getElementById('btn-claim-quint').addEventListener('click', () => humanClaim('quint'));
        document.getElementById('btn-claim-mahjong').addEventListener('click', () => humanClaim('mahjong'));
        document.getElementById('btn-pass').addEventListener('click', humanPass);

        // Close modals on backdrop click
        document.getElementById('scorecard-modal').addEventListener('click', e => {
            if (e.target === e.currentTarget) hideScorecard();
        });
        document.getElementById('gameover-modal').addEventListener('click', e => {
            if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
        });

        startGame();
    });

    // -----------------------------------------------------------------------
    // GAME LIFECYCLE
    // -----------------------------------------------------------------------
    function startGame() {
        document.getElementById('gameover-modal').classList.add('hidden');
        document.getElementById('claim-controls').classList.add('hidden');
        document.getElementById('game-log-entries').innerHTML = '';
        selectedTileIdx = -1;
        _botRunning = false;
        // If auto-play was on, keep it on for the new game

        game = G.createGame({
            numPlayers: 4,
            humanIndex: 0,
            names: ['You (East)', 'South', 'West', 'North']
        });

        game.callbacks.onPhaseChange = onPhaseChange;
        game.callbacks.onLog = msg => {
            console.log('[MJ]', msg);
            appendLogEntry(msg);
        };

        G.dealTiles(game);

        // Init bots
        for (let i = 1; i < 4; i++) B.initBot(game, i);

        renderAll();
    }

    function appendLogEntry(msg) {
        const el = document.createElement('div');
        el.className = 'log-entry';
        const lower = msg.toLowerCase();
        if (lower.includes('mahjong')) el.classList.add('log-mahjong');
        else if (lower.includes('draw')) el.classList.add('log-draw');
        else if (lower.includes('discard')) el.classList.add('log-discard');
        else if (lower.includes('claim') || lower.includes('pung') || lower.includes('kong') || lower.includes('quint')) el.classList.add('log-claim');
        el.textContent = msg;
        const container = document.getElementById('game-log-entries');
        container.appendChild(el);
        // Auto-scroll to bottom (newest at top via column-reverse)
        const log = document.getElementById('game-log');
        log.scrollTop = 0;
    }

    function onPhaseChange() {
        renderAll();

        if (!game || game.phase === G.PHASE.GAME_OVER) {
            _botRunning = false;
            if (game) showGameOver();
            return;
        }

        const cp = game.currentPlayer;
        const isHuman = game.players[cp].isHuman;
        const treatAsBot = !isHuman || autoPlayOn;

        if (game.phase === G.PHASE.TURN_DRAW && treatAsBot) {
            scheduleBotAction(() => botDraw(cp));

        if (game.phase === G.PHASE.TURN_DISCARD && treatAsBot) {

    // Serialize bot actions to avoid race conditions
    function scheduleBotAction(fn) {

            if (game && game.phase !== G.PHASE.GAME_OVER) fn();
        }, BOT_DELAY);

    function botDraw(cp) {
        if (!game || game.phase !== G.PHASE.TURN_DRAW || game.currentPlayer !== cp) return;

        if (autoPlayOn && game.players[cp].isHuman && !game.players[cp].targetHands) {
            B.initBot(game, cp);
        }
        const tile = G.drawTile(game);
        if (!tile) return;

        // Check self mahjong
        const mj = G.checkSelfMahjong(game);
        if (mj) {

    }

        if (!game || game.phase !== G.PHASE.TURN_DISCARD || game.currentPlayer !== cp) return;

        if (idx >= 0) {

        const canMJ = G.canCallMahjong(game, 0);

            resolveBotClaims(botClaims);
